<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lumen — Expenses</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root, .palette-warm {
    --bg: #f5efe4; --bg-soft: #ede5d4; --ink: #1c1812; --ink-soft: #8b7f6e;
    --rule: #e3d9c5; --over: #9b3c3c;
    --font-display: 'Fraunces', serif;
    --font-sans: 'JetBrains Mono', ui-monospace, monospace;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  .palette-night {
    --bg: #1d1a14; --bg-soft: #25221b; --ink: #ece5d4; --ink-soft: #8b8170;
    --rule: #3a352a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--font-sans); -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    transition: background 240ms ease, color 240ms ease;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }
  input, select { font-family: inherit; outline: none; color: inherit; }
  ::selection { background: var(--ink); color: var(--bg); }

  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideLeft  { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes sheetUp  { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  @keyframes ghostIn  { 0% { opacity: 0; transform: translateY(-6px); background: rgba(0,0,0,0.06); }
                        60% { opacity: 1; transform: translateY(0); background: rgba(0,0,0,0.06); }
                        100% { opacity: 1; transform: translateY(0); background: transparent; } }

  .topbar {
    position: absolute; top: 18px; right: 22px; display: flex; gap: 4px; z-index: 20;
    align-items: center;
  }
  .icon-btn {
    background: transparent; border: none; color: var(--ink); cursor: pointer;
    padding: 8px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 99px; transition: background 150ms ease;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.05); }
  .icon-btn.active { background: var(--ink); color: var(--bg); }

  .view-toggle {
    display: inline-flex; align-items: center;
    background: transparent; border: 1px solid var(--rule); border-radius: 999px;
    padding: 3px; gap: 2px; margin-right: 6px;
  }
  .view-toggle button {
    background: transparent; border: none; cursor: pointer;
    padding: 6px 8px; border-radius: 999px;
    color: var(--ink-soft); display: inline-flex; align-items: center; justify-content: center;
    transition: background 150ms ease, color 150ms ease;
  }
  .view-toggle button:hover { color: var(--ink); }
  .view-toggle button.active { background: var(--ink); color: var(--bg); }
  .view-toggle button svg { display: block; }

  .topbar-divider { width: 1px; height: 18px; background: var(--rule); margin: 0 4px; }

  .mono { font: 500 10px var(--font-mono); letter-spacing: 0.24em; color: var(--ink-soft); text-transform: uppercase; }
  .mono-tight { font: 500 9px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); text-transform: uppercase; }

  /* ---------- DAILY VIEW ---------- */
  .daily-shell {
    max-width: 720px; margin: 0 auto;
    padding: 60px 60px 140px;
    animation: slideLeft 320ms ease;
  }
  .daily-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 40px; gap: 14px; flex-wrap: wrap;
  }
  .month-tag { font: 500 10px var(--font-mono); letter-spacing: 0.28em; color: var(--ink-soft); text-transform: uppercase; }
  .day-nav { display: flex; gap: 6px; align-items: center; }
  .day-nav .chev {
    width: 28px; height: 28px; border-radius: 99px;
    color: var(--ink-soft); transition: background 150ms ease, color 150ms ease;
  }
  .day-nav .chev:hover { background: rgba(0,0,0,0.05); color: var(--ink); }
  .jump-today {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--ink); color: var(--ink);
    font: 500 10px var(--font-mono); letter-spacing: 0.22em;
    padding: 7px 12px; border-radius: 999px;
  }
  .jump-today::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 99px; background: var(--over);
    animation: pulseDot 1.6s ease-in-out infinite;
  }

  .day-of-week { font: italic 400 18px/1 var(--font-display); color: var(--ink-soft); margin-bottom: 14px; }
  .day-headline { font: 400 96px/1 var(--font-display); letter-spacing: -0.01em; margin: 0 0 56px; }

  .today-label {
    font: 500 10px var(--font-mono); letter-spacing: 0.24em; color: var(--ink-soft);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .amount-big {
    display: flex; align-items: flex-start; gap: 6px; margin-bottom: 18px;
    font: 300 120px/0.9 var(--font-display); color: var(--ink);
  }
  .amount-big .currency { font-size: 0.32em; margin-top: 0.18em; color: var(--ink-soft); }
  .amount-big .num { letter-spacing: -0.04em; }
  .amount-big.closed { color: var(--ink-soft); text-decoration: line-through; }

  .delta {
    font: 500 10px var(--font-mono); letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 36px; min-height: 14px;
  }
  .delta.over { color: var(--over); }

  .day-rows { margin-bottom: 36px; }
  .day-row {
    display: grid; grid-template-columns: 14px 1fr auto auto;
    gap: 14px; align-items: center;
    padding: 16px 0; border-top: 1px solid var(--rule);
    cursor: pointer; transition: background 150ms ease;
  }
  .day-row:hover { background: rgba(0,0,0,0.02); margin-inline: -8px; padding-inline: 8px; }
  .day-row.ghost { animation: ghostIn 600ms cubic-bezier(0.22,1,0.36,1); }
  .day-row .dot { width: 8px; height: 8px; border-radius: 99px; justify-self: center; }
  .day-row .meta { display: flex; flex-direction: column; gap: 3px; }
  .day-row .label { font: 400 16px var(--font-sans); color: var(--ink); }
  .day-row .cat { font: 500 9px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); text-transform: uppercase; }
  .day-row .amt { font: italic 400 26px/1 var(--font-display); }
  .day-row .x {
    opacity: 0; background: transparent; border: none; color: var(--ink-soft);
    font-size: 18px; padding: 2px; margin-left: 6px; transition: opacity 150ms;
  }
  .day-row:hover .x { opacity: 0.6; }
  .day-row .x:hover { opacity: 1; color: var(--over); }

  .day-empty {
    font: italic 400 16px/1.5 var(--font-display); color: var(--ink-soft);
    padding: 18px 0; border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }

  .pill {
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--rule); cursor: pointer;
    font: 500 9px var(--font-mono); letter-spacing: 0.2em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 999px;
    transition: all 150ms ease;
  }
  .pill:hover { color: var(--ink); border-color: var(--ink); }
  .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .close-day-row { padding-top: 12px; padding-bottom: 48px; display: flex; justify-content: flex-end; }

  .budget-rail { border-top: 1px solid var(--rule); padding-top: 32px; }
  .pacing-msg {
    font: italic 400 17px/1.5 var(--font-display); color: var(--ink-soft);
    margin-bottom: 24px; max-width: 480px;
  }
  .rail-track { position: relative; height: 1px; background: var(--rule); margin-bottom: 14px; }
  .rail-fill {
    position: absolute; left: 0; top: -1px; height: 3px; background: var(--ink);
    transition: width 600ms cubic-bezier(0.22,1,0.36,1), background 200ms;
  }
  .rail-fill.over { background: var(--over); }
  .rail-pace { position: absolute; top: -4px; height: 9px; width: 1px; background: var(--ink-soft); }
  .rail-meta, .rail-meta-2 {
    display: flex; justify-content: space-between;
    font: 500 10px var(--font-mono); letter-spacing: 0.2em; color: var(--ink-soft); text-transform: uppercase;
  }
  .rail-meta-2 { font-size: 9px; letter-spacing: 0.18em; margin-top: 6px; opacity: 0.75; }
  .rail-over { color: var(--over); }

  /* ---------- MONTHLY VIEW ---------- */
  .monthly-shell {
    max-width: 980px; margin: 0 auto;
    padding: 60px 60px 140px;
    animation: slideRight 320ms ease;
  }
  .monthly-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 48px; gap: 14px; flex-wrap: wrap;
  }
  .monthly-title-block { display: flex; flex-direction: column; gap: 6px; }
  .monthly-kicker { font: italic 400 16px var(--font-display); color: var(--ink-soft); }
  .monthly-headline { font: 400 64px/1 var(--font-display); letter-spacing: -0.01em; margin: 0; }
  .monthly-controls { display: flex; gap: 8px; align-items: center; }
  .monthly-controls .chev {
    width: 32px; height: 32px; border-radius: 99px;
    color: var(--ink-soft); transition: background 150ms ease, color 150ms ease;
  }
  .monthly-controls .chev:hover { background: rgba(0,0,0,0.05); color: var(--ink); }

  .month-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    margin-bottom: 56px;
  }
  .month-stat { padding: 20px 24px; border-right: 1px solid var(--rule); }
  .month-stat:last-child { border-right: none; }
  .month-stat .lbl {
    font: 500 9px var(--font-mono); letter-spacing: 0.22em;
    color: var(--ink-soft); margin-bottom: 8px; text-transform: uppercase;
  }
  .month-stat .val { font: 400 36px/1 var(--font-display); letter-spacing: -0.02em; }
  .month-stat .sub { font: italic 400 13px var(--font-display); color: var(--ink-soft); margin-top: 6px; }
  .month-stat .sub.over { color: var(--over); }

  .cal-section { margin-bottom: 64px; }
  .cal-section-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 20px;
  }
  .cal-dow {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 10px;
  }
  .cal-dow div {
    font: 500 10px var(--font-mono); letter-spacing: 0.18em;
    color: var(--ink-soft); text-align: center; padding: 6px 0;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .cal-cell { position: relative; aspect-ratio: 1 / 1; }
  .cal-cell .cell-btn {
    width: 100%; height: 100%; position: relative; padding: 10px;
    background: transparent; border: 1px solid var(--rule); border-radius: 3px;
    cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
    text-align: left; font-family: inherit;
    transition: background 200ms ease, border-color 200ms ease, transform 150ms ease;
  }
  .cal-cell .cell-btn:hover { transform: translateY(-2px); }
  .cal-cell.today .cell-btn { border: 1.5px solid var(--ink); }
  .cal-cell.selected .cell-btn { box-shadow: inset 0 0 0 1px var(--ink); border-color: var(--ink); }
  .cal-cell.closed { opacity: 0.55; }
  .cal-cell .cell-head { display: flex; align-items: center; gap: 6px; }
  .cal-cell .cell-dot { width: 6px; height: 6px; border-radius: 99px; }
  .cal-cell .cell-num {
    font: 500 11px var(--font-mono); letter-spacing: 0.08em; color: var(--ink-soft);
  }
  .cal-cell.today .cell-num { color: var(--ink); font-weight: 700; }
  .cal-cell.closed .cell-num { text-decoration: line-through; }
  .cal-cell .today-pulse {
    margin-left: auto; display: inline-block;
    width: 5px; height: 5px; border-radius: 99px; background: var(--over);
    animation: pulseDot 1.6s ease-in-out infinite;
  }
  .cal-cell .cell-amt { font: italic 400 16px/1 var(--font-display); color: var(--ink); }
  .cal-cell .cell-dash { font: 500 9px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); }
  .cal-cell .cell-toggle {
    position: absolute; top: 5px; right: 5px; z-index: 2;
    width: 18px; height: 18px; border-radius: 99px;
    background: var(--bg); border: 1px solid var(--rule); color: var(--ink-soft); padding: 0;
    display: flex; align-items: center; justify-content: center;
    font: 500 11px var(--font-mono); line-height: 1;
    opacity: 0; transition: opacity 150ms ease; cursor: pointer;
  }
  .cal-cell:hover .cell-toggle { opacity: 1; }

  .cat-section-head { margin-bottom: 24px; }
  .cat-row {
    display: grid; grid-template-columns: 12px 1fr 1.6fr 130px;
    gap: 20px; align-items: center;
    padding: 18px 0; border-bottom: 1px solid var(--rule);
  }
  .cat-row:first-of-type { border-top: 1px solid var(--rule); }
  .cat-row .cat-dot { width: 10px; height: 10px; border-radius: 99px; justify-self: center; }
  .cat-row .cat-name { font: 400 16px var(--font-sans); }
  .cat-row .cat-bar-track { position: relative; height: 1px; background: var(--rule); }
  .cat-row .cat-bar-fill {
    position: absolute; left: 0; top: -1.5px; height: 4px;
    transition: width 600ms cubic-bezier(0.22,1,0.36,1);
  }
  .cat-row .cat-amt {
    font: italic 400 18px var(--font-display); color: var(--ink); text-align: right;
  }
  .cat-row .cat-amt .budget { color: var(--ink-soft); font-size: 14px; }

  /* ---------- FAB + Modal ---------- */
  .fab-wrap {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: center; pointer-events: none;
    padding: 32px 0 26px; z-index: 30;
    background-image: linear-gradient(to bottom, transparent 0%, var(--bg) 65%);
  }
  .fab-pill {
    pointer-events: auto;
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink); color: var(--bg); cursor: pointer;
    border: 1px solid var(--ink);
    font: 500 11px var(--font-mono); letter-spacing: 0.24em;
    padding: 14px 28px; border-radius: 999px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.12);
    transition: transform 200ms cubic-bezier(0.22,1,0.36,1);
  }
  .fab-pill:hover { transform: translateY(-2px); }
  .fab-pill .plus { font-size: 18px; line-height: 1; font-weight: 300; margin-top: -1px; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(28,24,18,0.32);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
    animation: fadeIn 220ms ease;
  }
  .modal {
    background: var(--bg); color: var(--ink);
    width: 440px; max-width: 92%; padding: 32px 36px 28px; border-radius: 4px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.18);
    border: 1px solid var(--rule);
    animation: sheetUp 320ms cubic-bezier(0.22,1,0.36,1);
  }
  .modal-kicker { font: 500 10px var(--font-mono); letter-spacing: 0.22em; color: var(--ink-soft); margin-bottom: 14px; }
  .amount-input-wrap {
    display: flex; align-items: baseline; gap: 6px; margin-bottom: 18px;
    padding-bottom: 12px; border-bottom: 1px solid var(--rule);
  }
  .amount-input-wrap .currency { font: 300 32px/1 var(--font-display); color: var(--ink-soft); }
  .amount-input-wrap input {
    flex: 1; font: 300 48px/1 var(--font-display); letter-spacing: -0.02em;
    color: var(--ink); background: transparent; border: none; padding: 0;
  }
  .amount-input-wrap input::-webkit-outer-spin-button,
  .amount-input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .field-label { font: 500 10px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); text-transform: uppercase; margin-bottom: 8px; }
  .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .cat-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 999px;
    color: var(--ink); cursor: pointer; font: 400 13px var(--font-sans);
    transition: all 150ms ease;
  }
  .chip-dot { width: 8px; height: 8px; border-radius: 99px; }
  .note-day-row { display: grid; grid-template-columns: 1fr 100px; gap: 12px; margin-bottom: 22px; }
  .note-day-row input {
    width: 100%; font: 400 14px var(--font-sans); color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--rule);
    padding: 6px 0; outline: none;
  }
  .modal-actions { display: flex; justify-content: flex-end; gap: 14px; }
  .btn-cancel {
    background: transparent; border: none; color: var(--ink-soft); cursor: pointer;
    font: 500 11px var(--font-mono); letter-spacing: 0.2em; text-transform: uppercase;
    padding: 10px 14px;
  }
  .btn-add {
    background: var(--ink); color: var(--bg); border: none; cursor: pointer;
    font: 500 11px var(--font-mono); letter-spacing: 0.2em; text-transform: uppercase;
    padding: 10px 18px; border-radius: 2px;
  }
  .btn-add:disabled { opacity: 0.4; cursor: default; }

  /* ---------- Settings ---------- */
  .settings { max-width: 900px; margin: 0 auto; padding: 52px 60px 80px; }
  .set-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  .set-back {
    background: transparent; border: none; cursor: pointer;
    font: 500 10px var(--font-mono); letter-spacing: 0.24em;
    color: var(--ink-soft); padding: 0;
    display: inline-flex; align-items: center; gap: 8px; text-transform: uppercase;
  }
  .set-back:hover { color: var(--ink); }
  .set-kicker { font: italic 400 15px var(--font-display); color: var(--ink-soft); margin-bottom: 6px; }
  .set-headline { font: 400 64px/1 var(--font-display); letter-spacing: -0.01em; margin: 0 0 48px; }
  .set-section { margin-bottom: 36px; }
  .set-section .head {
    font: 500 10px var(--font-mono); letter-spacing: 0.24em;
    color: var(--ink-soft); margin-bottom: 14px; text-transform: uppercase;
  }
  .set-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 14px; align-items: center; padding: 14px 0; border-top: 1px solid var(--rule);
  }
  .set-row .title { font: 400 16px var(--font-sans); color: var(--ink); margin-bottom: 4px; }
  .set-row .desc { font: italic 400 14px/1.4 var(--font-display); color: var(--ink-soft); }
  .toggle {
    width: 36px; height: 20px; border-radius: 999px;
    background: var(--rule); border: none; cursor: pointer; padding: 2px;
    position: relative; transition: background 200ms ease;
  }
  .toggle.on { background: var(--ink); }
  .toggle-knob {
    width: 14px; height: 14px; border-radius: 99px; background: var(--bg);
    transition: transform 200ms cubic-bezier(0.22,1,0.36,1);
  }
  .toggle.on .toggle-knob { transform: translateX(16px); }
  .cat-row-edit {
    display: grid; grid-template-columns: 20px 1fr 100px 56px;
    gap: 14px; align-items: center;
    padding: 14px 0; border-top: 1px solid var(--rule);
  }
  .cat-row-edit.disabled { opacity: 0.55; }
  .color-swatch {
    width: 14px; height: 14px; border-radius: 99px;
    border: 1px solid rgba(0,0,0,0.1); cursor: pointer; padding: 0;
  }
  .cat-row-edit .label-input {
    font: 400 15px var(--font-sans); color: var(--ink);
    background: transparent; border: none; outline: none; padding: 4px 0; width: 100%;
  }
  .cat-row-edit .budget-input { display: flex; align-items: baseline; gap: 4px; justify-content: flex-end; }
  .cat-row-edit .budget-input span { font: italic 400 14px var(--font-display); color: var(--ink-soft); }
  .cat-row-edit .budget-input input {
    width: 70px; font: italic 400 22px var(--font-display); text-align: right;
    background: transparent; border: none; border-bottom: 1px solid var(--rule);
    padding: 2px 0; color: var(--ink);
  }

  @media (max-width: 700px) {
    .daily-shell { padding: 50px 22px 140px; }
    .day-headline { font-size: 56px; }
    .amount-big { font-size: 72px; }
    .monthly-shell { padding: 50px 22px 140px; }
    .monthly-headline { font-size: 42px; }
    .month-stats { grid-template-columns: 1fr 1fr; }
    .month-stat:nth-child(3) { display: none; }
    .month-stat:nth-child(2) { border-right: none; }
    .month-stat .val { font-size: 26px; }
    .cal-grid, .cal-dow { gap: 4px; }
    .cal-cell .cell-btn { padding: 6px; }
    .cal-cell .cell-num { font-size: 10px; }
    .cal-cell .cell-amt { font-size: 12px; }
    .cat-row { grid-template-columns: 10px 1fr 80px; gap: 12px; }
    .cat-row .cat-bar-track { display: none; }
    .cat-row .cat-amt { font-size: 15px; }
    .pacing-msg { font-size: 15px; margin-bottom: 20px; }
    .settings { padding: 36px 22px 80px; }
    .set-headline { font-size: 38px; margin-bottom: 28px; }
    .view-toggle button { padding: 5px 7px; }
  }
</style>
</head>
<body class="palette-warm">

<div id="app"></div>

<script>
'use strict';

const CATEGORIES_INIT = [

function realToday() {
  const d = new Date();
  return { year: d.getFullYear(), month: d.getMonth(), day: d.getDate() };
}
const TODAY = realToday();

function fmtMoney(n) { if (n == null) return ''; return `$${Math.round(n).toLocaleString('en-US')}`; }
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function firstDayOfMonth(y, m) { return new Date(y, m, 1).getDay(); }

function expensesByDay(expenses, enabledKeys) {
  const byDay = {};
  for (const e of expenses) {
    if (enabledKeys && !enabledKeys.has(e.cat)) continue;
    (byDay[e.day] ||= []).push(e);
  }
  return byDay;
}

function totalsByCategory(expenses, categories) {
  const enabled = categories.filter(c => c.enabled);
  const totals = Object.fromEntries(enabled.map(c => [c.key, 0]));
  for (const e of expenses) if (totals[e.cat] != null) totals[e.cat] += e.amount;
  const total = Object.values(totals).reduce((a, b) => a + b, 0);
  return enabled.map(c => ({
    ...c, amount: totals[c.key] || 0,
    pct: total ? totals[c.key] / total : 0,
  }));
}

function dominantCatForDay(expenses, catByKey) {
  if (!expenses || !expenses.length) return null;
  const sums = {};
  for (const e of expenses) sums[e.cat] = (sums[e.cat] || 0) + e.amount;
  const winner = Object.entries(sums).sort((a, b) => b[1] - a[1])[0][0];
  return catByKey[winner];
}

function buildCells(year, month) {
  const dim = daysInMonth(year, month);
  const first = firstDayOfMonth(year, month);
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  while (cells.length < 42) cells.push(null);
  while (cells.length > 35 && cells.slice(-7).every(c => c === null)) cells.length -= 7;
  return cells;
}

function pacingMessage(spent, expected, effBudget, closedCount) {
  if (closedCount > 0 && spent < expected) {
    return `Closed ${closedCount} day${closedCount === 1 ? '' : 's'}. Budget recalibrated to ${fmtMoney(effBudget)}.`;
  }
  if (spent > expected) return `Over by ${fmtMoney(spent - expected)} this month, but still on pace overall.`;
  if (spent < expected * 0.85) return `Under pace by ${fmtMoney(expected - spent)} — a quiet month.`;
  return `Tracking steady against ${fmtMoney(effBudget)} budget.`;
}

const state = {
  expenses: SEED_EXPENSES.slice(),
  categories: CATEGORIES_INIT.map(c => ({ ...c })),
  closedDays: [],
  year: TODAY.year, month: TODAY.month, selectedDay: TODAY.day,
  budgetsEnabled: true, monthlyCap: 900, darkMode: false,
  route: 'daily',
};
const ui = {
  modalOpen: false, modalDay: TODAY.day,
  modalAmount: '', modalLabel: '', modalCat: 'food',
  ghostId: null,
};

function derive() {
  const enabledKeys = new Set(state.categories.filter(c => c.enabled).map(c => c.key));
  const byDay = expensesByDay(state.expenses, enabledKeys);
  const totals = totalsByCategory(state.expenses, state.categories);
  const monthTotal = totals.reduce((a, b) => a + b.amount, 0);
  const sumOfCats = state.categories.filter(c => c.enabled).reduce((a, b) => a + (b.budget || 0), 0);
  const totalBudget = state.budgetsEnabled ? sumOfCats : (state.monthlyCap || 0);
  const dim = daysInMonth(state.year, state.month);
  const dayRate = totalBudget / dim;
  const effBudget = totalBudget - dayRate * state.closedDays.length;

  const isCurrentMonth = state.year === TODAY.year && state.month === TODAY.month;
  const refDay = isCurrentMonth ? TODAY.day : dim;
  const trackedDays = Math.max(0, refDay - state.closedDays.filter(d => d <= refDay).length);
  const expected = dayRate * trackedDays;
  const monthDelta = monthTotal - expected;
  const catByKey = Object.fromEntries(state.categories.map(c => [c.key, c]));

  const selExp = byDay[state.selectedDay] || [];
  const selTotal = selExp.reduce((a, b) => a + b.amount, 0);
  const selClosed = state.closedDays.includes(state.selectedDay);

  return {
    byDay, totals, monthTotal, totalBudget, dim, dayRate, effBudget,
    isCurrentMonth, refDay, trackedDays, expected, monthDelta,
    catByKey, selExp, selTotal, selClosed,
  };
}

function h(tag, props, ...kids) {
  const el = document.createElement(tag);
  if (props) for (const [k, v] of Object.entries(props)) {
    if (v == null || v === false) continue;
    if (k === 'class') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'checked' || k === 'disabled' || k === 'value') el[k] = v;
    else el.setAttribute(k, v);
  }
  for (const c of kids.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return el;
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

const root = document.getElementById('app');

function render() {
  document.body.className = state.darkMode ? 'palette-night' : 'palette-warm';
  const topbar = renderTopbar();

  if (state.route === 'settings') {
    root.replaceChildren(topbar, renderSettings(derive()));
    return;
  }

  const d = derive();
  const view = state.route === 'monthly' ? renderMonthly(d) : renderDaily(d);
  const children = [
    topbar,
    view,
    h('div', { class: 'fab-wrap' },
      h('button', { class: 'fab-pill', onClick: openAddModal },
        h('span', { class: 'plus' }, '+'), 'LOG EXPENSE')),
  ];
  if (ui.modalOpen) children.push(renderModal(d));
  root.replaceChildren(...children);
}

function renderTopbar() {
  const onSettings = state.route === 'settings';
  const children = [];
  if (!onSettings) {
    children.push(h('div', { class: 'view-toggle' },
      h('button', {
        class: state.route === 'daily' ? 'active' : '',
        title: 'Daily view',
        onClick: () => { state.route = 'daily'; render(); },
      }, dayViewSvg()),
      h('button', {
        class: state.route === 'monthly' ? 'active' : '',
        title: 'Monthly view',
        onClick: () => { state.route = 'monthly'; render(); },
      }, monthViewSvg()),
    ));
    children.push(h('div', { class: 'topbar-divider' }));
  }
  children.push(h('button', { class: 'icon-btn', title: state.darkMode ? 'Light mode' : 'Dark mode',
    onClick: () => { state.darkMode = !state.darkMode; render(); } }, sunMoonSvg(state.darkMode)));
  children.push(h('button', { class: 'icon-btn' + (onSettings ? ' active' : ''),
    title: onSettings ? 'Close settings' : 'Settings',
    onClick: () => { state.route = onSettings ? 'daily' : 'settings'; render(); } }, gearSvg()));
  return h('div', { class: 'topbar' }, ...children);
}

function renderDaily(d) {
  const date = new Date(state.year, state.month, state.selectedDay);
  const dowFull = DOW_FULL[date.getDay()];
  const isCurMonthAndToday = d.isCurrentMonth && state.selectedDay === TODAY.day;
  const dim = d.dim;

  const navChildren = [
    h('button', { class: 'icon-btn chev', title: 'Previous day',
      onClick: () => stepDay(-1) }, chevSvg('left')),
  ];
  if (!isCurMonthAndToday) {
    navChildren.push(h('button', { class: 'jump-today',
      onClick: () => { state.year = TODAY.year; state.month = TODAY.month; state.selectedDay = TODAY.day; render(); } }, 'JUMP TO TODAY'));
  }
  navChildren.push(h('button', { class: 'icon-btn chev', title: 'Next day',
    onClick: () => stepDay(1) }, chevSvg('right')));

  const head = h('div', { class: 'daily-head' },
    h('div', { class: 'month-tag' }, `${MONTH_NAMES[state.month]} ${state.year}`.toUpperCase()),
    h('div', { class: 'day-nav' }, ...navChildren),
  );

  const dow = h('div', { class: 'day-of-week' }, dowFull);
  const headline = h('h1', { class: 'day-headline' }, `${MONTH_NAMES[state.month]} ${state.selectedDay}`);

  const todayLabel = h('div', { class: 'today-label' }, isCurMonthAndToday ? 'TODAY' : 'SELECTED DAY');
  const amount = h('div', { class: 'amount-big' + (d.selClosed ? ' closed' : '') },
    h('span', { class: 'currency' }, '$'),
    h('span', { class: 'num' }, String(Math.round(d.selTotal))),
  );

  const deltaText = d.selExp.length === 0
    ? (d.selClosed ? 'CLOSED — SKIPPED FROM PACING' : 'NOTHING LOGGED YET')
    : `${d.selExp.length} EXPENSE${d.selExp.length === 1 ? '' : 'S'}`;
  const delta = h('div', { class: 'delta' }, deltaText);

  const rows = h('div', { class: 'day-rows' });
  if (d.selExp.length === 0 && !d.selClosed) {
    rows.appendChild(h('div', { class: 'day-empty' },
      h('span', {}, 'No expenses for this day.'),
      h('button', { class: 'pill', onClick: openAddModal }, '+ LOG'),
    ));
  } else {
    d.selExp.forEach(e => {
      const cat = d.catByKey[e.cat];
      const isGhost = ui.ghostId === e.id;
      rows.appendChild(h('div', { class: 'day-row' + (isGhost ? ' ghost' : '') },
        h('span', { class: 'dot', style: { background: cat?.color || '#000' } }),
        h('div', { class: 'meta' },
          h('div', { class: 'label' }, e.label),
          h('div', { class: 'cat' }, (cat?.label || e.cat).toUpperCase()),
        ),
        h('div', { class: 'amt' }, fmtMoney(e.amount)),
        h('button', { class: 'x', title: 'Delete',
          onClick: () => { state.expenses = state.expenses.filter(x => x.id !== e.id); render(); } }, '×'),
      ));
    });
  }

  const closeRow = h('div', { class: 'close-day-row' },
    h('button', { class: 'pill' + (d.selClosed ? ' active' : ''),
      onClick: () => toggleClosedFor(state.selectedDay) },
      d.selClosed ? '↺ REOPEN DAY' : '× CLOSE THIS DAY'),
  );

  const railFillW = Math.min(1, d.monthTotal / Math.max(1, d.effBudget)) * 100;
  const racePct = Math.min(1, d.expected / Math.max(1, d.effBudget)) * 100;
  const isOver = d.monthTotal > d.effBudget;

  const railTrackChildren = [
    h('div', { class: 'rail-fill' + (isOver ? ' over' : ''), style: { width: railFillW + '%' } }),
  ];
  if (d.isCurrentMonth) {
    railTrackChildren.push(h('div', { class: 'rail-pace', style: { left: racePct + '%' } }));
  }

  const rail = h('div', { class: 'budget-rail' },
    h('div', { class: 'mono', style: { marginBottom: '14px' } }, 'THIS MONTH'),
    h('div', { class: 'pacing-msg' },
      pacingMessage(d.monthTotal, d.expected, d.effBudget, state.closedDays.length)),
    h('div', { class: 'rail-track' }, ...railTrackChildren),
    h('div', { class: 'rail-meta' },
      h('span', {}, `${fmtMoney(d.monthTotal)} OF ${fmtMoney(d.effBudget)}`),
      h('span', { class: d.monthDelta > 0 ? 'rail-over' : '' },
        d.monthDelta > 0 ? `+${fmtMoney(d.monthDelta)} OVER PACE` : `${fmtMoney(-d.monthDelta)} UNDER PACE`),
    ),
    h('div', { class: 'rail-meta-2' },
      h('span', {}, `DAY ${TODAY.day} OF ${dim} · ${fmtMoney(d.dayRate)}/DAY`),
      h('span', {}, `${fmtMoney(Math.max(0, d.effBudget - d.monthTotal))} REMAINING`),
    ),
  );

  return h('div', { class: 'daily-shell' }, head, dow, headline, todayLabel, amount, delta, rows, closeRow, rail);
}

function stepDay(delta) {
  const dim = daysInMonth(state.year, state.month);
  let next = state.selectedDay + delta;
  if (next < 1) {
    if (state.month === 0) { state.month = 11; state.year -= 1; }
    else state.month -= 1;
    next = daysInMonth(state.year, state.month);
  } else if (next > dim) {
    if (state.month === 11) { state.month = 0; state.year += 1; }
    else state.month += 1;
    next = 1;
  }
  state.selectedDay = next;
  render();
}

function renderMonthly(d) {
  const isCurMonth = d.isCurrentMonth;

  const head = h('div', { class: 'monthly-head' },
    h('div', { class: 'monthly-title-block' },
      h('div', { class: 'monthly-kicker' }, isCurMonth ? 'This month' : 'Viewing'),
      h('h1', { class: 'monthly-headline' }, `${MONTH_NAMES[state.month]} ${state.year}`),
    ),
    h('div', { class: 'monthly-controls' },
      h('button', { class: 'icon-btn chev', title: 'Previous month',
        onClick: () => {
          if (state.month === 0) { state.month = 11; state.year -= 1; } else state.month -= 1;
          render();
        } }, chevSvg('left')),
      h('button', { class: 'icon-btn chev', title: 'Next month',
        onClick: () => {
          if (state.month === 11) { state.month = 0; state.year += 1; } else state.month += 1;
          render();
        } }, chevSvg('right')),
    ),
  );

  const stats = h('div', { class: 'month-stats' },
    h('div', { class: 'month-stat' },
      h('div', { class: 'lbl' }, 'SPENT'),
      h('div', { class: 'val' }, fmtMoney(d.monthTotal)),
      h('div', { class: 'sub' + (d.monthDelta > 0 ? ' over' : '') },
        d.monthDelta > 0 ? `${fmtMoney(d.monthDelta)} over pace` : `${fmtMoney(-d.monthDelta)} under pace`),
    ),
    h('div', { class: 'month-stat' },
      h('div', { class: 'lbl' }, 'BUDGET'),
      h('div', { class: 'val' }, fmtMoney(d.effBudget)),
      h('div', { class: 'sub' }, `${fmtMoney(Math.max(0, d.effBudget - d.monthTotal))} remaining`),
    ),
    h('div', { class: 'month-stat' },
      h('div', { class: 'lbl' }, 'DAILY RATE'),
      h('div', { class: 'val' }, fmtMoney(d.dayRate)),
      h('div', { class: 'sub' }, `day ${isCurMonth ? TODAY.day : d.dim} of ${d.dim}`),
    ),
  );

  const cells = buildCells(state.year, state.month);
  const calSection = h('div', { class: 'cal-section' },
    h('div', { class: 'cal-section-head' },
      h('div', { class: 'mono' }, 'CALENDAR'),
      h('div', { class: 'mono-tight' }, 'TAP A DAY TO INSPECT'),
    ),
    h('div', { class: 'cal-dow' }, ...DOW_SHORT.map(s => h('div', {}, s))),
    h('div', { class: 'cal-grid' }, ...cells.map(day => renderCalCell(day, d))),
  );

  const catRows = d.totals.map(t => {
    const over = t.amount > t.budget;
    const pct = state.budgetsEnabled ? Math.min(1, t.amount / Math.max(1, t.budget)) : t.pct;
    const amtChildren = state.budgetsEnabled
      ? [h('span', {}, fmtMoney(t.amount)), ' ', h('span', { class: 'budget' }, `/ ${fmtMoney(t.budget)}`)]
      : [fmtMoney(t.amount)];
    return h('div', { class: 'cat-row' },
      h('span', { class: 'cat-dot', style: { background: t.color } }),
      h('span', { class: 'cat-name' }, t.label),
      h('div', { class: 'cat-bar-track' },
        h('div', { class: 'cat-bar-fill', style: { width: (pct * 100) + '%', background: over ? '#9b3c3c' : t.color } }),
      ),
      h('span', { class: 'cat-amt' }, ...amtChildren),
    );
  });

  const catSection = h('div', {},
    h('div', { class: 'cat-section-head' }, h('div', { class: 'mono' }, 'BY CATEGORY')),
    ...catRows,
  );

  return h('div', { class: 'monthly-shell' }, head, stats, calSection, catSection);
}

function renderCalCell(day, d) {
  if (day == null) return h('div', { class: 'cal-cell' });
  const exp = d.byDay[day] || [];
  const total = exp.reduce((a, b) => a + b.amount, 0);
  const dom = dominantCatForDay(exp, d.catByKey);
  const closed = state.closedDays.includes(day);
  const isToday = d.isCurrentMonth && day === TODAY.day;
  const isSel = day === state.selectedDay;
  const fill = closed ? 'rgba(0,0,0,0.04)' : (total > 0 ? (dom?.color || '#000') + '22' : 'transparent');

  const cls = ['cal-cell'];
  if (isToday) cls.push('today');
  if (isSel) cls.push('selected');
  if (closed) cls.push('closed');

  const headChildren = [];
  if (dom && !closed) headChildren.push(h('span', { class: 'cell-dot', style: { background: dom.color } }));
  headChildren.push(h('span', { class: 'cell-num' }, String(day)));
  if (isToday) headChildren.push(h('span', { class: 'today-pulse', title: 'Today' }));

  const cellChildren = [h('div', { class: 'cell-head' }, ...headChildren)];
  if (total > 0 && !closed) cellChildren.push(h('div', { class: 'cell-amt' }, `$${Math.round(total)}`));
  if (closed) cellChildren.push(h('div', { class: 'cell-dash' }, '—'));

  return h('div', { class: cls.join(' ') },
    h('button', { class: 'cell-btn', style: { background: fill },
      onClick: () => { state.selectedDay = day; state.route = 'daily'; render(); } },
      ...cellChildren,
    ),
    h('button', { class: 'cell-toggle', title: closed ? 'Reopen' : 'Close day',
      onClick: (ev) => { ev.stopPropagation(); toggleClosedFor(day); } },
      closed ? '↺' : '×'),
  );
}

function toggleClosedFor(day) {
  const has = state.closedDays.includes(day);
  state.closedDays = has ? state.closedDays.filter(x => x !== day) : [...state.closedDays, day].sort((a, b) => a - b);
  render();
}

function openAddModal() {
  ui.modalOpen = true;
  ui.modalDay = state.selectedDay;
  ui.modalAmount = '';
  ui.modalLabel = '';
  ui.modalCat = state.categories.find(c => c.enabled)?.key || 'food';
  render();
  setTimeout(() => document.querySelector('.amount-input-wrap input')?.focus(), 60);
}
function closeAddModal() { ui.modalOpen = false; render(); }
function submitAdd() {
  const n = parseFloat(ui.modalAmount);
  if (!n || n <= 0) return;
  const catObj = state.categories.find(c => c.key === ui.modalCat);
  const id = 'e' + Math.random().toString(36).slice(2, 8);
  state.expenses.unshift({
    id, day: ui.modalDay, cat: ui.modalCat,
    label: (ui.modalLabel || '').trim() || catObj?.label || 'Expense',
    amount: n,
  });
  state.selectedDay = ui.modalDay;
  ui.ghostId = id; ui.modalOpen = false;
  state.route = 'daily';
  render();
  setTimeout(() => { ui.ghostId = null; render(); }, 800);
}

function renderModal(d) {
  const enabledCats = state.categories.filter(c => c.enabled);
  return h('div', { class: 'modal-backdrop', onClick: closeAddModal },
    h('div', { class: 'modal', onClick: ev => ev.stopPropagation() },
      h('div', { class: 'modal-kicker' }, 'NEW EXPENSE'),
      h('div', { class: 'amount-input-wrap' },
        h('span', { class: 'currency' }, '$'),
        h('input', { type: 'number', step: '0.01', placeholder: '0', inputmode: 'decimal',
          value: ui.modalAmount,
          onInput: ev => { ui.modalAmount = ev.target.value; },
          onKeydown: ev => { if (ev.key === 'Enter') submitAdd(); if (ev.key === 'Escape') closeAddModal(); } }),
      ),
      h('div', { class: 'field-label' }, 'Category'),
      h('div', { class: 'cat-chips' }, ...enabledCats.map(c => {
        const active = c.key === ui.modalCat;
        return h('button', { class: 'cat-chip',
          style: {
            border: `1px solid ${active ? c.color : 'var(--rule)'}`,
            background: active ? c.color + '22' : 'transparent',
          },
          onClick: () => { ui.modalCat = c.key; render(); setTimeout(() => document.querySelector('.amount-input-wrap input')?.focus(), 0); } },
          h('span', { class: 'chip-dot', style: { background: c.color } }), c.label);
      })),
      h('div', { class: 'note-day-row' },
        h('div', {},
          h('div', { class: 'field-label' }, 'Note'),
          h('input', { type: 'text', placeholder: 'optional', value: ui.modalLabel,
            onInput: ev => { ui.modalLabel = ev.target.value; },
            onKeydown: ev => { if (ev.key === 'Enter') submitAdd(); if (ev.key === 'Escape') closeAddModal(); } }),
        ),
        h('div', {},
          h('div', { class: 'field-label' }, 'Day'),
          h('input', { type: 'number', min: '1', max: String(d.dim), value: String(ui.modalDay),
            onInput: ev => { ui.modalDay = parseInt(ev.target.value, 10) || 1; },
            onKeydown: ev => { if (ev.key === 'Enter') submitAdd(); if (ev.key === 'Escape') closeAddModal(); } }),
        ),
      ),
      h('div', { class: 'modal-actions' },
        h('button', { class: 'btn-cancel', onClick: closeAddModal }, 'Cancel'),
        h('button', { class: 'btn-add', onClick: submitAdd, disabled: !(parseFloat(ui.modalAmount) > 0) }, 'Add'),
      ),
    ),
  );
}

function renderSettings(d) {
  return h('div', { class: 'settings' },
    h('div', { class: 'set-top' },
      h('button', { class: 'set-back', onClick: () => { state.route = 'daily'; render(); } }, '← BACK'),
    ),
    h('div', { class: 'set-kicker' }, 'Settings'),
    h('h1', { class: 'set-headline' }, 'How Lumen tracks you.'),
    renderToggleSection('Budget mode', 'Per-category budgets',
      state.budgetsEnabled ? 'Each category has its own budget. Monthly total is the sum.' : 'Single monthly cap only — categories track spend but no per-category limits.',
      state.budgetsEnabled, (v) => { state.budgetsEnabled = v; render(); }),
    renderToggleSection('Appearance', 'Dark mode', 'Switches the canvas to a warm-night palette.',
      state.darkMode, (v) => { state.darkMode = v; render(); }),
    renderCatSection(),
  );
}

function renderToggleSection(head, title, desc, on, onChange) {
  return h('section', { class: 'set-section' },
    h('div', { class: 'head' }, head),
    h('div', { class: 'set-row' },
      h('div', {},
        h('div', { class: 'title' }, title),
        h('div', { class: 'desc' }, desc),
      ),
      h('button', { class: 'toggle' + (on ? ' on' : ''), onClick: () => onChange(!on) },
        h('div', { class: 'toggle-knob' })),
    ),
  );
}

function renderCatSection() {
  return h('section', { class: 'set-section' },
    h('div', { class: 'head' }, 'Categories'),
    h('div', {}, ...state.categories.map(c => h('div', { class: 'cat-row-edit' + (c.enabled ? '' : ' disabled') },
      h('button', { class: 'color-swatch', style: { background: c.color }, title: 'Color' }),
      h('input', { class: 'label-input', type: 'text', value: c.label,
        onInput: ev => { c.label = ev.target.value; }, onBlur: () => render() }),
      h('div', { class: 'budget-input' },
        h('span', {}, '$'),
        h('input', { type: 'number', min: '0', value: String(c.budget || 0),
          onInput: ev => { c.budget = parseInt(ev.target.value, 10) || 0; }, onBlur: () => render() }),
      ),
      h('button', { class: 'toggle' + (c.enabled ? ' on' : ''),
        onClick: () => { c.enabled = !c.enabled; render(); } }, h('div', { class: 'toggle-knob' })),
    ))),
  );
}

document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape') {
    if (ui.modalOpen) closeAddModal();
    else if (state.route === 'settings') { state.route = 'daily'; render(); }
    return;
  }
  if (ui.modalOpen || state.route === 'settings') return;
  if (ev.key === 'ArrowLeft') {
    if (state.route === 'daily') stepDay(-1);
    else { if (state.month === 0) { state.month = 11; state.year -= 1; } else state.month -= 1; render(); }
  } else if (ev.key === 'ArrowRight') {
    if (state.route === 'daily') stepDay(1);
    else { if (state.month === 11) { state.month = 0; state.year += 1; } else state.month += 1; render(); }
  }
});

render();
</script>
</body>
</html>
