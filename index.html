  }

  // ============================================================
  // ANIMATION: count-up the hero number after each render
  // ============================================================
  function animateHeroNum() {
    const el = document.querySelector('.figure-amount .num[data-target]');
    if (!el) return;
    const target = parseInt(el.getAttribute('data-target'), 10) || 0;
    const start = ui.prevHeroNum;
    if (start === target) {
      el.textContent = String(target);
      ui.prevHeroNum = target;
      return;
    }
    const dur = 520;
    const t0 = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - t0) / dur);
      // ease out cubic
      const e = 1 - Math.pow(1 - t, 3);
      const v = Math.round(start + (target - start) * e);
      el.textContent = String(v);
      if (t < 1) requestAnimationFrame(tick);
      else {
        el.textContent = String(target);
        el.classList.remove('settled'); void el.offsetWidth;
        el.classList.add('settled');
        ui.prevHeroNum = target;
      }
    }
    requestAnimationFrame(tick);
  }

  // ============================================================
  // ACTIONS
  // ============================================================
  function stepDay(delta) {
    const dim_ = dim(state.year, state.month);
    let d = state.selectedDay + delta;
    if (d < 1) {
      if (state.month === 0) { state.month = 11; state.year -= 1; }
      else state.month -= 1;
      d = dim(state.year, state.month);
    } else if (d > dim_) {
      if (state.month === 11) { state.month = 0; state.year += 1; }
      else state.month += 1;
      d = 1;
    }
    state.selectedDay = d; render();
  }
  function stepMonth(delta) {
    let m = state.month + delta, y = state.year;
    if (m < 0) { m = 11; y -= 1; }
    else if (m > 11) { m = 0; y += 1; }
    state.month = m; state.year = y;
    const dim_ = dim(y, m);
    if (state.selectedDay > dim_) state.selectedDay = dim_;
    render();
  }
  function removeExpense(id) {
    const idx = state.expenses.findIndex(e => e.id === id);
    if (idx < 0) return;
    const expense = state.expenses[idx];
    state.expenses.splice(idx, 1);
    if (ui.undoTimer) { clearTimeout(ui.undoTimer); ui.undoTimer = null; }
    ui.undoExpense = { expense, idx };
    ui.undoTimer = setTimeout(() => { ui.undoExpense = null; ui.undoTimer = null; render(); }, 4500);
    render();
  }
  function undoRemove() {
    if (!ui.undoExpense) return;
    const { expense, idx } = ui.undoExpense;
    state.expenses.splice(Math.min(idx, state.expenses.length), 0, expense);
    if (ui.undoTimer) { clearTimeout(ui.undoTimer); ui.undoTimer = null; }
    ui.undoExpense = null;
    render();
  }
  const NEW_CAT_COLORS = [
    '#c9824a', '#5e7a8c', '#7a6b94', '#a8556e', '#5a7a4a', '#8b7548',
    '#b3835f', '#6c8b91', '#9a7a5a', '#7e6a87',
  ];
  function addCategory() {
    const used = new Set(state.categories.map(c => (c.color || '').toLowerCase()));
    const color = NEW_CAT_COLORS.find(c => !used.has(c.toLowerCase()))
      || NEW_CAT_COLORS[state.categories.length % NEW_CAT_COLORS.length];
    let key = 'cat-' + Date.now();
    while (state.categories.some(c => c.key === key)) key += '-' + Math.floor(Math.random() * 1000);
    state.categories.push({ key, label: 'New category', color, budget: 0, enabled: true });
    render();
  }
  function removeCategory(key) {
    if (key === 'other') return; // 'Other' is the cascade target — never deletable
    const cat = state.categories.find(c => c.key === key);
    if (!cat) return;
    const orphans = state.expenses.filter(e => e.cat === key).length;
    const msg = orphans > 0
      ? orphans + ' expense' + (orphans === 1 ? '' : 's') + ' in this category will move to Other.'
      : 'This category has no expenses.';
    showSheet({
      title: 'Delete "' + cat.label + '"?',
      message: msg,
      confirmLabel: 'Delete',
      destructive: true,
      onConfirm: () => {
        state.categories = state.categories.filter(c => c.key !== key);
        state.expenses = state.expenses.map(e => e.cat === key ? { ...e, cat: 'other' } : e);
        if (ui.modalCat === key) ui.modalCat = state.categories[0]?.key || null;
        if (state.viewCat === key) { state.viewCat = null; if (state.route === 'cat-detail') state.route = 'monthly'; }
        render();
      },
    });
  }

  function clearAllData() {
    showSheet({
      title: 'Clear all data?',
      message: 'Removes every expense and resets your monthly budget. This cannot be undone.',
      confirmLabel: 'Clear data',
      destructive: true,
      onConfirm: () => {
        state.expenses = [];
        state.closedDays = [];
        state.monthlyBudget = 1000;
        state.viewCat = null;
        state.route = 'daily';
        state.year = TODAY.year;
        state.month = TODAY.month;
        state.selectedDay = TODAY.day;
        render();
      },
    });
  }

  // ============================================================
  // EXPORT / IMPORT
  // ============================================================
  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateStamp() {
    const d = new Date();
    return d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate());
  }
  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
  }
  function csvEscape(s) {
    s = String(s ?? '');
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function parseCSVRow(line) {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQ) {
        if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
        else if (ch === '"') inQ = false;
        else cur += ch;
      } else {
        if (ch === '"') inQ = true;
        else if (ch === ',') { cells.push(cur); cur = ''; }
        else cur += ch;
      }
    }
    cells.push(cur);
    return cells;
  }
  function flashToast(msg) {
    if (ui.flashTimer) clearTimeout(ui.flashTimer);
    ui.flashMsg = msg;
    ui.flashTimer = setTimeout(() => { ui.flashMsg = null; ui.flashTimer = null; render(); }, 3500);
    render();
  }

  function exportJSON() {
    const payload = {
      schemaVersion: 1,
      exportedAt: new Date().toISOString(),
      expenses: state.expenses,
      categories: state.categories,
      monthlyBudget: state.monthlyBudget,
      budgetsEnabled: state.budgetsEnabled,
      userName: state.userName,
      closedDays: state.closedDays,
      darkMode: state.darkMode,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    downloadBlob(blob, 'lumen-backup-' + dateStamp() + '.json');
  }

  function exportCSV() {
    const catByKey = Object.fromEntries(state.categories.map(c => [c.key, c.label]));
    const rows = [['date', 'amount', 'category', 'note']];
    const sorted = state.expenses.slice().sort((a, b) =>
      a.year - b.year || a.month - b.month || a.day - b.day);
    for (const e of sorted) {
      const date = e.year + '-' + pad2(e.month + 1) + '-' + pad2(e.day);
      rows.push([date, Number(e.amount).toFixed(2), catByKey[e.cat] || e.cat, e.label || '']);
    }
    const csv = rows.map(r => r.map(csvEscape).join(',')).join('\n');
    downloadBlob(new Blob([csv], { type: 'text/csv' }), 'lumen-expenses-' + dateStamp() + '.csv');
  }

  function triggerImport() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,.csv,application/json,text/csv';
    input.onchange = () => {
      const file = input.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const text = String(reader.result || '');
        const isJson = file.name.toLowerCase().endsWith('.json') || text.trim().startsWith('{');
        if (isJson) importJSON(text);
        else importCSV(text);
      };
      reader.readAsText(file);
    };
    input.click();
  }

  function importJSON(text) {
    let data;
    try { data = JSON.parse(text); }
    catch { flashToast('Could not parse JSON file'); return; }
    if (!data || typeof data !== 'object') { flashToast('Invalid backup file'); return; }
    const count = Array.isArray(data.expenses) ? data.expenses.length : 0;
    showSheet({
      title: 'Restore from backup?',
      message: 'Replaces all existing data with ' + count +
        ' expense' + (count === 1 ? '' : 's') + ' from the file.',
      confirmLabel: 'Restore',
      destructive: true,
      onConfirm: () => {
        if (Array.isArray(data.expenses)) state.expenses = data.expenses;
        if (Array.isArray(data.categories)) state.categories = data.categories;
        if (typeof data.monthlyBudget === 'number') state.monthlyBudget = data.monthlyBudget;
        if (typeof data.budgetsEnabled === 'boolean') state.budgetsEnabled = data.budgetsEnabled;
        if (typeof data.userName === 'string') state.userName = data.userName;
        if (Array.isArray(data.closedDays)) state.closedDays = data.closedDays;
        if (typeof data.darkMode === 'boolean') state.darkMode = data.darkMode;
        for (const e of state.expenses) {
          if (typeof e.year !== 'number') e.year = TODAY.year;
          if (typeof e.month !== 'number') e.month = TODAY.month;
        }
        render();
        flashToast('Restored ' + state.expenses.length + ' expenses');
      },
    });
  }

  function importCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
    if (lines.length < 2) { flashToast('CSV is empty'); return; }
    const header = parseCSVRow(lines[0]).map(s => s.toLowerCase().trim());
    const idxDate = header.indexOf('date');
    const idxAmount = header.indexOf('amount');
    const idxCat = header.indexOf('category');
    const idxNote = header.indexOf('note');
    if (idxDate < 0 || idxAmount < 0 || idxCat < 0) {
      flashToast('CSV needs date, amount, category columns');
      return;
    }
    const catByLabel = Object.fromEntries(state.categories.map(c => [c.label.toLowerCase(), c.key]));
    const catByKey = Object.fromEntries(state.categories.map(c => [c.key, c.key]));
    const otherKey = state.categories.find(c => c.key === 'other')?.key
      || state.categories[0]?.key
      || 'other';
    const additions = [];
    let skipped = 0;
    for (let i = 1; i < lines.length; i++) {
      const cells = parseCSVRow(lines[i]);
      const dateStr = (cells[idxDate] || '').trim();
      const amount = parseFloat(cells[idxAmount]);
      const catStr = (cells[idxCat] || '').trim().toLowerCase();
      const note = idxNote >= 0 ? (cells[idxNote] || '').trim() : '';
      const m = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(dateStr);
      if (!m || !isFinite(amount) || amount <= 0) { skipped++; continue; }
      additions.push({
        id: 'e' + Math.random().toString(36).slice(2, 8) + i,
        year: +m[1], month: +m[2] - 1, day: +m[3],
        cat: catByLabel[catStr] || catByKey[catStr] || otherKey,
        label: note,
        amount,
      });
    }
    if (additions.length === 0) { flashToast('No valid rows found'); return; }
    const note = skipped > 0
      ? 'Skipping ' + skipped + ' invalid row' + (skipped === 1 ? '' : 's') + '.'
      : 'Adds them to your existing expenses.';
    showSheet({
      title: 'Import ' + additions.length + ' expense' +
        (additions.length === 1 ? '' : 's') + '?',
      message: note,
      confirmLabel: 'Import',
      onConfirm: () => {
        state.expenses = [...additions, ...state.expenses];
        render();
        flashToast('Imported ' + additions.length + ' expenses');
      },
    });
  }
  function toggleClosedFor(day) {
    const k = closedKey(state.year, state.month, day);
    const list = (state.closedDays || []).filter(x => typeof x === 'string');
    const has = list.includes(k);
    state.closedDays = has ? list.filter(x => x !== k) : [...list, k];
    render();
  }

  function openAddModal() {
    ui.focusReturn = { kind: 'fab' };
    ui.modalOpen = true; ui.modalEditId = null;
    ui.modalDay = state.selectedDay; ui.modalAmount = ''; ui.modalLabel = '';
    const otherCat = state.categories.find(c => c.key === 'other' && c.enabled);
    ui.modalCat = otherCat?.key
      || state.categories.find(c => c.enabled)?.key
      || 'food';
    render();
    setTimeout(() => document.querySelector('.amount-input-wrap input')?.focus(), 60);
  }
  function openEditModal(id) {
    const e = state.expenses.find(x => x.id === id);
    if (!e) return;
    ui.focusReturn = { kind: 'row', id };
    ui.modalOpen = true; ui.modalEditId = id;
    ui.modalDay = e.day;
    ui.modalAmount = String(Math.round(e.amount * 100));
    ui.modalLabel = e.label;
    ui.modalCat = e.cat;
    render();
    setTimeout(() => document.querySelector('.amount-input-wrap input')?.focus(), 60);
  }
  function closeModal() {
    const ret = ui.focusReturn;
    ui.modalOpen = false; ui.modalEditId = null;
    ui.focusReturn = null;
    render();
    setTimeout(() => {
      if (!ret) return;
      if (ret.kind === 'fab') document.querySelector('.fab-pill')?.focus();
      else if (ret.kind === 'row') document.querySelector('.ledger-row[data-id="' + ret.id + '"]')?.focus();
    }, 0);
  }
  function submitAdd() {
    const n = (parseInt(ui.modalAmount, 10) || 0) / 100;
    if (!n || n <= 0) return;
    const catObj = state.categories.find(c => c.key === ui.modalCat);
    const id = 'e' + Math.random().toString(36).slice(2, 8);
    state.expenses.unshift({
      id,
      year: state.year, month: state.month, day: ui.modalDay,
      cat: ui.modalCat,
      label: (ui.modalLabel || '').trim() || (catObj?.label.toLowerCase() || 'expense'),
      amount: n,
    });
    state.selectedDay = ui.modalDay; state.route = 'daily';
    ui.ghostId = id; ui.modalOpen = false; ui.modalEditId = null;
    render();
    setTimeout(() => { ui.ghostId = null; render(); }, 800);
  }
  function submitEdit() {
    const n = (parseInt(ui.modalAmount, 10) || 0) / 100;
    if (!n || n <= 0) return;
    const e = state.expenses.find(x => x.id === ui.modalEditId);
    if (!e) { closeModal(); return; }
    const catObj = state.categories.find(c => c.key === ui.modalCat);
    e.amount = n; e.cat = ui.modalCat; e.day = ui.modalDay;
    e.label = (ui.modalLabel || '').trim() || (catObj?.label.toLowerCase() || 'expense');
    state.selectedDay = ui.modalDay;
    ui.ghostId = e.id; ui.modalOpen = false; ui.modalEditId = null;
    render();
    setTimeout(() => { ui.ghostId = null; render(); }, 800);
  }
  function deleteFromModal() {
    if (!ui.modalEditId) return;
    state.expenses = state.expenses.filter(e => e.id !== ui.modalEditId);
    ui.modalOpen = false; ui.modalEditId = null;
    render();
  }

  // wrap render to also kick off the count-up
  const _origRender = render;
  render = function() {
    _origRender();
    if (state.route === 'daily') {
      // run count-up after layout is in
      requestAnimationFrame(animateHeroNum);
    }
  };

  // ============================================================
  // KEYBOARD + SCROLL
  // ============================================================
  document.addEventListener('keydown', ev => {
    if (ev.key === 'Escape') {
      if (ui.sheet) dismissSheet();
      else if (ui.modalOpen) closeModal();
      else if (state.route === 'settings' || state.route === 'cat-detail') {
        state.route = (state.route === 'cat-detail') ? 'monthly' : 'daily';
        render();
      }
      return;
    }
    if (ui.modalOpen || ui.sheet) return;
    // Don't intercept keystrokes while the user is typing in a field.
    const t = ev.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (ev.key === 'ArrowLeft') {
      if (state.route === 'daily') stepDay(-1);
      else if (state.route === 'monthly') stepMonth(-1);
    } else if (ev.key === 'ArrowRight') {
      if (state.route === 'daily') stepDay(1);
      else if (state.route === 'monthly') stepMonth(1);
    } else if (ev.key === 'n' || ev.key === 'N') openAddModal();
  });

  // ============================================================
  // SWIPE PAGING
  // ============================================================
  let _swipe = null;
  document.addEventListener('pointerdown', (ev) => {
    if (state.route !== 'daily' && state.route !== 'monthly') return;
    if (ui.modalOpen || ui.sheet) return;
    if (ev.pointerType === 'mouse' && ev.button !== 0) return;
    const shell = ev.target.closest('.shell.daily, .shell.monthly');
    if (!shell) return;
    if (ev.target.closest('input, textarea, [contenteditable], button, .ledger-row, .cat-row, .cell-btn, .toast')) return;
    _swipe = { shell, startX: ev.clientX, startY: ev.clientY, dx: 0, dy: 0, decided: null };
  });
  document.addEventListener('pointermove', (ev) => {
    if (!_swipe) return;
    const s = _swipe;
    s.dx = ev.clientX - s.startX;
    s.dy = ev.clientY - s.startY;
    if (!s.decided) {
      if (Math.abs(s.dx) < 10 && Math.abs(s.dy) < 10) return;
      s.decided = (Math.abs(s.dx) > Math.abs(s.dy) * 1.4) ? 'h' : 'v';
      if (s.decided === 'h') s.shell.classList.add('swiping');
    }
    if (s.decided === 'h') {
      ev.preventDefault();
      const dx = s.dx;
      s.shell.style.transform = 'translateX(' + dx + 'px)';
      s.shell.style.opacity = String(1 - Math.min(0.45, Math.abs(dx) / 800));
    }
  }, { passive: false });
  function endSwipe() {
    if (!_swipe) return;
    const s = _swipe; _swipe = null;
    if (s.decided !== 'h') return;
    s.shell.classList.remove('swiping');
    const w = s.shell.offsetWidth;
    const threshold = Math.max(60, w * 0.18);
    if (s.dx <= -threshold || s.dx >= threshold) {
      const dir = s.dx < 0 ? 1 : -1;
      s.shell.style.transition = 'transform 180ms cubic-bezier(0.4,0,1,1), opacity 180ms';
      s.shell.style.transform = 'translateX(' + (-dir * (w + 40)) + 'px)';
      s.shell.style.opacity = '0';
      setTimeout(() => {
        state.route = state.route === 'daily' ? 'monthly' : 'daily';
        render();
      }, 160);
    } else {
      s.shell.style.transition = 'transform 220ms cubic-bezier(0.22,1,0.36,1), opacity 200ms';
      requestAnimationFrame(() => {
        s.shell.style.transform = '';
        s.shell.style.opacity = '';
      });
      setTimeout(() => { s.shell.style.transition = ''; }, 240);
    }
  }
  document.addEventListener('pointerup', endSwipe);
  document.addEventListener('pointercancel', endSwipe);

  if (window.visualViewport) {
    const updateKeyboardInset = () => {
      const vv = window.visualViewport;
      const diff = window.innerHeight - vv.height - vv.offsetTop;
      const inset = diff > 80 ? diff : 0;
      document.documentElement.style.setProperty('--keyboard-inset', inset + 'px');
    };
    window.visualViewport.addEventListener('resize', updateKeyboardInset);
    window.visualViewport.addEventListener('scroll', updateKeyboardInset);
    updateKeyboardInset();
  }

  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    const s = y > 4;
    if (s !== ui.scrolled) {
      ui.scrolled = s;
      const tb = document.querySelector('.topbar');
      if (tb) tb.classList.toggle('scrolled', s);
    }
    const progress = Math.min(1, Math.max(0, y / 80));
    document.documentElement.style.setProperty('--scroll-progress', progress.toFixed(3));
  }, { passive: true });

  render();

  // ============================================================
  // SERVICE WORKER
  // ============================================================
  let _swReg = null;
  let _swReloading = false;
  function applySwUpdate() {
    if (!_swReg?.waiting) { location.reload(); return; }
    _swReg.waiting.postMessage('skipWaiting');
  }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').then(reg => {
        _swReg = reg;
        if (reg.waiting && navigator.serviceWorker.controller) {
          ui.swUpdateReady = true; render();
        }
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              ui.swUpdateReady = true; render();
            }
          });
        });
      }).catch(() => {});
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (_swReloading) return;
        _swReloading = true;
        location.reload();
      });
    });
  }
</script>
</body>
</html>
