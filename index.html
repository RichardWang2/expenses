<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Lumen" />
<meta name="theme-color" content="#f5efe4" />
<title>Lumen — Expenses</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root, .palette-warm {
    --bg: #f5efe4;
    --bg-soft: #ede5d4;
    --ink: #1c1812;
    --ink-soft: #8b7f6e;
    --rule: #e3d9c5;
    --over: #9b3c3c;
    --font-display: 'Fraunces', serif;
    --font-sans: 'JetBrains Mono', ui-monospace, monospace;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  .palette-night {
    --bg: #1d1a14;
    --bg-soft: #25221b;
    --ink: #ece5d4;
    --ink-soft: #8b8170;
    --rule: #3a352a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    transition: background 240ms ease, color 240ms ease;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }
  input, select { font-family: inherit; outline: none; color: inherit; }
  ::selection { background: var(--ink); color: var(--bg); }

  /* ---------- Animations ---------- */
  @keyframes fadeIn      { from { opacity: 0; }                       to { opacity: 1; } }
  @keyframes sheetUp     { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseDot    { 0%, 100% { opacity: 1; transform: scale(1); }
                           50%      { opacity: 0.4; transform: scale(0.7); } }
  @keyframes ghostIn     { 0%   { opacity: 0; transform: translateY(-6px); background: rgba(0,0,0,0.06); }
                           60%  { opacity: 1; transform: translateY(0);    background: rgba(0,0,0,0.06); }
                           100% { opacity: 1; transform: translateY(0);    background: transparent; } }
  @keyframes slideInRight{ from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }

  /* ---------- Shell ---------- */
  .shell {
    max-width: 1180px;
    margin: 0 auto;
    padding: 52px 60px 120px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 70px;
    animation: fadeIn 320ms ease;
  }

  /* ---------- Mono labels ---------- */
  .mono { font: 500 10px var(--font-mono); letter-spacing: 0.24em; color: var(--ink-soft); text-transform: uppercase; }
  .mono-tight { font: 500 9px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); text-transform: uppercase; }
  .display-italic { font: italic 400 16px/1 var(--font-display); color: var(--ink-soft); }

  /* ---------- LEFT column ---------- */
  .left { display: flex; flex-direction: column; min-height: 0; }
  .left-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 36px; gap: 14px; flex-wrap: wrap;
  }
  .month-tag { font: 500 10px var(--font-mono); letter-spacing: 0.28em; color: var(--ink-soft); text-transform: uppercase; }
  .jump-today {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--ink); color: var(--ink);
    font: 500 10px var(--font-mono); letter-spacing: 0.22em;
    padding: 7px 12px; border-radius: 999px;
  }
  .jump-today::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 99px; background: var(--over);
    animation: pulseDot 1.6s ease-in-out infinite;
  }

  .day-of-week { font: italic 400 16px/1 var(--font-display); color: var(--ink-soft); margin-bottom: 14px; }
  .day-headline {
    font: 400 84px/1 var(--font-display); letter-spacing: -0.01em; margin: 0;
  }
  .today-label {
    font: 500 10px var(--font-mono); letter-spacing: 0.24em; color: var(--ink-soft);
    text-transform: uppercase; margin-top: 48px; margin-bottom: 8px;
  }
  .amount-big {
    display: flex; align-items: flex-start; gap: 4px; margin-bottom: 14px;
    font: 300 96px/0.9 var(--font-display); color: var(--ink);
  }
  .amount-big .currency {
    font-size: 0.32em; margin-top: 0.18em; color: var(--ink-soft);
  }
  .amount-big .num { letter-spacing: -0.04em; }
  .amount-big.closed { color: var(--ink-soft); text-decoration: line-through; }

  .delta {
    font: 500 10px var(--font-mono); letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 24px;
    min-height: 14px;
  }
  .delta.over { color: var(--over); }

  .day-rows { margin-bottom: 28px; }
  .day-section { display: flex; flex-direction: column; }
  .day-section + .day-section { margin-top: 18px; }
  .day-section-head {
    display: flex; align-items: baseline; gap: 10px;
    padding: 10px 0 4px; cursor: pointer;
    border-top: 1px solid var(--rule);
  }
  .day-section-head .mono-tight { color: var(--ink); }
  .day-section-head:hover .mono-tight { color: var(--ink); }
  .day-section-head .closed-tag { color: var(--ink-soft); }
  .day-row {
    display: grid; grid-template-columns: 14px 1fr auto;
    gap: 12px; align-items: center;
    padding: 14px 0; border-top: 1px solid var(--rule);
    cursor: pointer; transition: background 150ms ease;
  }
  .day-row:hover { background: rgba(0,0,0,0.02); margin-inline: -8px; padding-inline: 8px; }
  .day-row.ghost { animation: ghostIn 600ms cubic-bezier(0.22,1,0.36,1); }
  .day-row .dot { width: 8px; height: 8px; border-radius: 99px; justify-self: center; }
  .day-row .label { font: 400 15px var(--font-sans); color: var(--ink); margin-bottom: 2px; }
  .day-row .cat { font: 500 9px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); text-transform: uppercase; }
  .day-row .amt { font: italic 400 24px/1 var(--font-display); }
  .day-row .x {
    opacity: 0; background: transparent; border: none; color: var(--ink-soft);
    font-size: 18px; padding: 2px; margin-left: 6px; transition: opacity 150ms;
  }
  .day-row:hover .x { opacity: 0.6; }
  .day-row .row-actions { display: flex; align-items: center; gap: 0; }

  .day-row.editing { grid-template-columns: auto 1fr 100px; cursor: default; background: transparent; }
  .day-row.editing select {
    font: 500 10px var(--font-mono); letter-spacing: 0.18em;
    background: transparent; border: 1px solid var(--rule);
    color: var(--ink); padding: 4px 6px; text-transform: uppercase;
  }
  .day-row.editing input[type="text"] {
    font: 400 15px var(--font-sans); color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--ink);
    padding: 4px 0; width: 100%;
  }
  .day-row.editing .amt-edit {
    display: flex; align-items: baseline; gap: 4px; justify-content: flex-end;
  }
  .day-row.editing .amt-edit .currency-sm { font: italic 400 16px var(--font-display); color: var(--ink-soft); }
  .day-row.editing .amt-edit input {
    width: 60px; font: italic 400 22px var(--font-display); text-align: right;
    background: transparent; border: none; border-bottom: 1px solid var(--ink); padding: 2px 0;
  }

  .day-empty {
    font: italic 400 15px/1.5 var(--font-display); color: var(--ink-soft);
    padding: 14px 0; border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }

  .pill {
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--rule); cursor: pointer;
    font: 500 9px var(--font-mono); letter-spacing: 0.2em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 999px;
    transition: all 150ms ease;
  }
  .pill:hover { color: var(--ink); border-color: var(--ink); }
  .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .close-day-row {
    padding-top: 10px; display: flex; justify-content: flex-end;
  }

  .pacing-msg {
    font: italic 400 16px/1.5 var(--font-display); color: var(--ink-soft);
    margin-bottom: 32px; max-width: 380px;
  }

  /* Budget rail */
  .budget-rail { margin-top: auto; }
  .rail-track { position: relative; height: 1px; background: var(--rule); margin-bottom: 14px; }
  .rail-fill {
    position: absolute; left: 0; top: -1px; height: 3px;
    background: var(--ink);
    transition: width 600ms cubic-bezier(0.22,1,0.36,1), background 200ms;
  }
  .rail-fill.over { background: var(--over); }
  .rail-pace {
    position: absolute; top: -4px; height: 9px; width: 1px;
    background: var(--ink-soft);
  }
  .rail-meta, .rail-meta-2 {
    display: flex; justify-content: space-between;
    font: 500 10px var(--font-mono); letter-spacing: 0.2em; color: var(--ink-soft);
    text-transform: uppercase;
  }
  .rail-meta-2 { font-size: 9px; letter-spacing: 0.18em; margin-top: 6px; opacity: 0.75; }
  .rail-over { color: var(--over); }

  /* ---------- RIGHT column ---------- */
  .right { display: flex; flex-direction: column; gap: 36px; padding-top: 28px; }
  .right-head { display: flex; justify-content: space-between; align-items: center; }
  .right-head h2 { font: italic 400 22px/1 var(--font-display); margin: 0; font-weight: 400; }
  .right-controls { display: flex; gap: 14px; align-items: center; }
  .icon-btn {
    background: transparent; border: none; color: var(--ink); cursor: pointer;
    padding: 4px; display: inline-flex; align-items: center; justify-content: center;
  }
  .chev {
    width: 26px; height: 26px; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }

  /* Calendar */
  .cal-dow {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 8px;
  }
  .cal-dow div {
    font: 500 10px var(--font-mono); letter-spacing: 0.18em;
    color: var(--ink-soft); text-align: center; padding: 4px 0;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-cell {
    position: relative; aspect-ratio: 1 / 1;
  }
  .cal-cell .cell-btn {
    width: 100%; height: 100%; position: relative; padding: 6px;
    background: transparent; border: 1px solid var(--rule); border-radius: 2px;
    cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
    text-align: left; font-family: inherit;
    transition: background 200ms ease, border-color 200ms ease, transform 150ms ease;
  }
  .cal-cell .cell-btn:hover { transform: translateY(-1px); }
  .cal-cell.today .cell-btn { border: 1.5px solid var(--ink); }
  .cal-cell.selected .cell-btn { box-shadow: inset 0 0 0 1px var(--ink); border-color: var(--ink); }
  .cal-cell.closed { opacity: 0.55; }
  .cal-cell .cell-head { display: flex; align-items: center; gap: 4px; }
  .cal-cell .cell-dot { width: 5px; height: 5px; border-radius: 99px; }
  .cal-cell .cell-num {
    font: 500 10px var(--font-mono); letter-spacing: 0.08em;
    color: var(--ink-soft);
  }
  .cal-cell.today .cell-num { color: var(--ink); font-weight: 700; }
  .cal-cell.closed .cell-num { text-decoration: line-through; }
  .cal-cell .today-pulse {
    margin-left: auto; display: inline-block;
    width: 5px; height: 5px; border-radius: 99px; background: var(--over);
    animation: pulseDot 1.6s ease-in-out infinite;
  }
  .cal-cell .cell-amt { font: italic 400 13px/1 var(--font-display); color: var(--ink); }
  .cal-cell .cell-dash { font: 500 8px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); }
  .cal-cell .cell-toggle {
    position: absolute; top: 3px; right: 3px; z-index: 2;
    width: 16px; height: 16px; border-radius: 99px;
    background: var(--bg); border: 1px solid var(--rule);
    color: var(--ink-soft); padding: 0;
    display: flex; align-items: center; justify-content: center;
    font: 500 10px var(--font-mono); line-height: 1;
    opacity: 0; transition: opacity 150ms ease;
    cursor: pointer;
  }
  .cal-cell:hover .cell-toggle { opacity: 1; }

  /* By Category */
  .by-cat-head {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px;
  }
  .by-cat-grid {
    display: grid; grid-template-columns: 160px 1fr; gap: 28px; align-items: center;
  }
  .donut-wrap { display: flex; align-items: center; justify-content: center; }
  .cat-list { display: flex; flex-direction: column; gap: 10px; }
  .cat-row {
    display: grid; grid-template-columns: 12px 1fr auto auto;
    gap: 12px; align-items: center; padding: 8px 0;
    border-bottom: 1px dotted var(--rule);
  }
  .cat-row.budget { grid-template-columns: 12px 1fr auto auto; padding: 4px 0; border-bottom: none; }
  .cat-row .cat-dot { width: 8px; height: 8px; border-radius: 99px; justify-self: center; }
  .cat-row .cat-name { font: 400 14px var(--font-sans); color: var(--ink); }
  .cat-row .cat-amt { font: italic 400 18px var(--font-display); color: var(--ink); }
  .cat-row .cat-pct { font: 500 10px var(--font-mono); letter-spacing: 0.1em; color: var(--ink-soft); text-align: right; min-width: 40px; }
  .cat-row .cat-budget { font: 500 10px var(--font-mono); letter-spacing: 0.1em; color: var(--ink-soft); text-align: right; min-width: 44px; }
  .cat-row.budget .cat-bar-wrap { min-width: 0; }
  .cat-row.budget .cat-bar-track {
    height: 2px; background: var(--rule); margin-top: 6px; position: relative;
  }
  .cat-row.budget .cat-bar-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    transition: width 600ms cubic-bezier(0.22,1,0.36,1), background 200ms;
  }
  .cat-row.budget .cat-amt { font: italic 400 16px var(--font-display); }

  /* ---------- Top-right toolbar (persists on dashboard + settings) ---------- */
  .topbar {
    position: fixed; top: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 4px;
    padding: 18px 24px;
    padding-top: calc(18px + env(safe-area-inset-top));
    padding-right: calc(24px + env(safe-area-inset-right));
  }
  .topbar .icon-btn {
    background: transparent; border: none; color: var(--ink); cursor: pointer;
    padding: 8px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 150ms ease;
  }
  .topbar .icon-btn:hover { background: rgba(0,0,0,0.06); }
  .palette-night .topbar .icon-btn:hover { background: rgba(255,255,255,0.06); }
  .topbar .icon-btn.active { color: var(--ink); }

  /* ---------- Floating LOG EXPENSE pill ---------- */
  .fab-wrap {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: center;
    pointer-events: none; z-index: 40;
    padding: 44px 0 26px;
    background-image: linear-gradient(to bottom, transparent 0%, var(--bg) 65%);
    padding-bottom: calc(26px + env(safe-area-inset-bottom));
  }
  .fab-pill {
    pointer-events: auto;
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink); color: var(--bg);
    border: 1px solid var(--ink);
    font: 500 11px var(--font-mono); letter-spacing: 0.24em; text-transform: uppercase;
    padding: 14px 28px; border-radius: 999px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.12);
    transition: transform 200ms cubic-bezier(0.22,1,0.36,1), box-shadow 200ms ease;
  }
  .fab-pill:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(0,0,0,0.28), 0 2px 6px rgba(0,0,0,0.14); }
  .fab-pill .plus { font-size: 18px; line-height: 1; font-weight: 300; margin-top: -1px; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(28,24,18,0.32); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; animation: fadeIn 220ms ease;
  }
  .modal {
    background: var(--bg); color: var(--ink);
    width: 440px; max-width: 92%; padding: 32px 36px 28px; border-radius: 4px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.18);
    border: 1px solid var(--rule);
    font-family: var(--font-sans);
    animation: sheetUp 320ms cubic-bezier(0.22,1,0.36,1);
  }
  .modal .modal-kicker { font: 500 10px var(--font-mono); letter-spacing: 0.22em; color: var(--ink-soft); margin-bottom: 18px; text-transform: uppercase; }
  .modal .amount-input-wrap {
    display: flex; align-items: baseline; gap: 6px; margin-bottom: 24px;
    border-bottom: 1px solid var(--rule); padding-bottom: 14px;
  }
  .modal .amount-input-wrap .currency {
    font: 300 36px/1 var(--font-display); color: var(--ink-soft);
  }
  .modal .amount-input-wrap input {
    flex: 1; font: 400 44px/1 var(--font-display); color: var(--ink);
    border: none; outline: none; background: transparent; min-width: 0;
    -webkit-appearance: none;
  }
  .modal .field-label { font: 500 10px var(--font-mono); letter-spacing: 0.18em; color: var(--ink-soft); margin-bottom: 10px; text-transform: uppercase; }
  .cat-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
  .cat-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px; border-radius: 999px;
    border: 1px solid var(--rule); background: transparent; color: var(--ink);
    cursor: pointer; font: 400 13px var(--font-sans);
    transition: all 150ms ease;
  }
  .cat-chip .chip-dot { width: 8px; height: 8px; border-radius: 99px; }
  .modal .note-day-row {
    display: grid; grid-template-columns: 1fr 100px; gap: 12px; margin-bottom: 24px;
  }
  .modal .note-day-row .field-label { margin-bottom: 6px; font-size: 10px; }
  .modal .note-day-row input {
    width: 100%; font: 400 14px var(--font-sans); color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--rule);
    padding: 6px 0; outline: none;
  }
  .modal-actions { display: flex; justify-content: flex-end; gap: 14px; }
  .btn-cancel {
    background: transparent; border: none; color: var(--ink-soft); cursor: pointer;
    font: 500 11px var(--font-mono); letter-spacing: 0.2em; text-transform: uppercase;
    padding: 10px 14px;
  }
  .btn-add {
    background: var(--ink); color: var(--bg); border: none; cursor: pointer;
    font: 500 11px var(--font-mono); letter-spacing: 0.2em; text-transform: uppercase;
    padding: 10px 18px; border-radius: 2px;
  }
  .btn-add:disabled { opacity: 0.4; cursor: default; }

  /* ---------- Settings page ---------- */
  .settings {
    max-width: 900px; margin: 0 auto;
    padding: 52px 60px 80px;
    animation: slideInRight 360ms cubic-bezier(0.22,1,0.36,1);
  }
  .set-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 40px;
  }
  .set-back {
    background: transparent; border: none; cursor: pointer;
    font: 500 10px var(--font-mono); letter-spacing: 0.24em;
    color: var(--ink-soft); padding: 0;
    display: inline-flex; align-items: center; gap: 8px;
    text-transform: uppercase;
  }
  .set-back:hover { color: var(--ink); }
  .set-kicker { font: italic 400 15px var(--font-display); color: var(--ink-soft); margin-bottom: 6px; }
  .set-headline {
    font: 400 64px/1 var(--font-display); letter-spacing: -0.01em;
    margin: 0 0 48px; font-weight: 400;
  }

  .set-stat-strip {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    margin-bottom: 36px;
  }
  .set-stat { padding: 20px 24px; border-right: 1px solid var(--rule); }
  .set-stat:last-child { border-right: none; }
  .set-stat .lbl { font: 500 9px var(--font-mono); letter-spacing: 0.22em; color: var(--ink-soft); margin-bottom: 8px; text-transform: uppercase; }
  .set-stat .val { font: 400 36px/1 var(--font-display); letter-spacing: -0.02em; }
  .set-stat .sub { font: italic 400 12px var(--font-display); color: var(--ink-soft); margin-top: 4px; }

  .set-section { margin-bottom: 36px; }
  .set-section .head {
    font: 500 10px var(--font-mono); letter-spacing: 0.24em;
    color: var(--ink-soft); margin-bottom: 14px; text-transform: uppercase;
  }
  .set-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 14px; align-items: center;
    padding: 14px 0; border-top: 1px solid var(--rule);
  }
  .set-row .title { font: 400 16px var(--font-sans); color: var(--ink); margin-bottom: 4px; }
  .set-row .desc  { font: italic 400 14px/1.4 var(--font-display); color: var(--ink-soft); }
  .set-row .cap-input { display: flex; align-items: baseline; gap: 4px; }
  .set-row .cap-input span { font: italic 400 14px var(--font-display); color: var(--ink-soft); }
  .set-row .cap-input input {
    width: 90px; font: italic 400 22px var(--font-display); text-align: right;
    background: transparent; border: none; border-bottom: 1px solid var(--rule);
    padding: 2px 0; color: var(--ink);
  }

  /* Toggle switch */
  .toggle {

  }
  .toggle.on .toggle-knob { transform: translateX(16px); }

  /* Category rows */
  .cat-row-edit {

  }
  .cat-row-edit.disabled { opacity: 0.55; }

    width: 14px; height: 14px; border-radius: 99px;

  .color-popover {
    position: absolute; top: 22px; left: -4px; z-index: 5;

  .color-popover button.active { border: 2px solid var(--ink); }
  .cat-row-edit .label-input {

  .cat-row-edit .budget-input {

  .cat-row-edit .budget-input span { font: italic 400 14px var(--font-display); color: var(--ink-soft); }
  .cat-row-edit .budget-input input {

  .cat-add-btn.ready { background: var(--ink); color: var(--bg); border-color: var(--ink); cursor: pointer; }

  /* Closed days */
  .closed-explainer {

  .closed-chip {

    font: 500 10px var(--font-mono); letter-spacing: 0.18em;
    padding: 6px 10px; border-radius: 999px; text-transform: uppercase;
  }
  .closed-chip:hover { border-color: var(--ink); }
  .closed-chip span.x { color: var(--ink-soft); }
  .close-gaps-btn {

    padding: 10px 16px; border-radius: 999px;

  .close-gaps-btn:hover { background: var(--ink); color: var(--bg); }
  .closed-empty { font: italic 400 14px var(--font-display); color: var(--ink-soft); }

  /* ---------- Mobile (≤ 700px) ---------- */
  @media (max-width: 700px) {
    .shell {

    .right { gap: 24px; padding-top: 0; }

    .cal-cell .cell-btn { padding: 4px; }
    .cal-cell .cell-num { font-size: 9px; }
    .cal-cell .cell-amt { font-size: 11px; }
    .pacing-msg { font-size: 14px; margin-bottom: 20px; }
    .rail-meta { font-size: 9px; letter-spacing: 0.18em; }
    .modal { padding: 24px 22px 20px; }

  }

  /* Touch devices: hide hover-only affordances since they can't be reached */
  @media (hover: none) {

</style>

<body class="palette-warm">

<div id="app"></div>

<script>
'use strict';

// =============================================================
// Constants & seed data (ported from data.jsx + store.jsx)
// =============================================================

const STORAGE_KEY = 'lumen.v1';
const LEGACY_KEY  = 'ledger.v1';

const CATEGORIES_INIT = [
  { key: 'groceries', label: 'Groceries', color: '#7d8a4a', budget: 280, enabled: true },
  { key: 'food',      label: 'Food',      color: '#9b3c3c', budget: 220, enabled: true },
  { key: 'gas',       label: 'Gas',       color: '#5b6b85', budget: 160, enabled: true },
  { key: 'shopping',  label: 'Shopping',  color: '#7a4a6b', budget: 160, enabled: true },
  { key: 'other',     label: 'Other',     color: '#b8853a', budget:  80, enabled: true },
];

// Color pool used when adding new categories — first unused wins.
const PALETTE_POOL = [
  '#7d8a4a', '#9b3c3c', '#5b6b85', '#7a4a6b', '#b8853a',
  '#3f6b62', '#a8632b', '#4f5a78', '#8a5a8a', '#5a7a4d',
];

const SEED_EXPENSES = [
  { id: 'e1',  day: 5,  cat: 'groceries', label: 'Whole Foods',     amount: 65 },
  { id: 'e2',  day: 5,  cat: 'food',      label: 'Brunch — cafe',   amount: 10 },
  { id: 'e3',  day: 8,  cat: 'shopping',  label: 'Bookstore',       amount: 25 },
  { id: 'e4',  day: 12, cat: 'other',     label: 'Pharmacy',        amount: 8  },
  { id: 'e5',  day: 12, cat: 'gas',       label: 'Shell station',   amount: 22 },
  { id: 'e6',  day: 15, cat: 'groceries', label: 'Trader Joe’s',    amount: 30 },
  { id: 'e7',  day: 15, cat: 'food',      label: 'Dinner — Lupa',   amount: 20 },
  { id: 'e8',  day: 20, cat: 'gas',       label: 'BP',              amount: 38 },
  { id: 'e9',  day: 20, cat: 'food',      label: 'Lunch — sushi',   amount: 22 },
  { id: 'e10', day: 23, cat: 'food',      label: 'Coffee + pastry', amount: 14 },
  { id: 'e11', day: 27, cat: 'food',      label: 'Coffee + bagel',  amount: 15 },
  { id: 'e12', day: 27, cat: 'shopping',  label: 'Shoes',           amount: 32 },
];

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_SHORT   = ['S','M','T','W','T','F','S'];
const DOW_FULL    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DOW_3       = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

// Real "today" — the date the user is opening the app. Used for the
// pulsing dot, pace math, and the JUMP TO TODAY button.
function realToday() {
  const d = new Date();
  return { year: d.getFullYear(), month: d.getMonth(), day: d.getDate() };
}
const TODAY = realToday();

// =============================================================
// Pure helpers
// =============================================================

function fmtMoney(n) { if (n == null) return ''; return `$${Math.round(n).toLocaleString('en-US')}`; }
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function firstDayOfMonth(y, m) { return new Date(y, m, 1).getDay(); }

function expensesByDay(expenses, enabledKeys) {
  const byDay = {};
  for (const e of expenses) {
    if (enabledKeys && !enabledKeys.has(e.cat)) continue;
    (byDay[e.day] ||= []).push(e);
  }
  return byDay;
}

function totalsByCategory(expenses, categories) {
  const enabled = categories.filter(c => c.enabled);
  const totals  = Object.fromEntries(enabled.map(c => [c.key, 0]));
  for (const e of expenses) if (totals[e.cat] != null) totals[e.cat] += e.amount;
  const total = Object.values(totals).reduce((a, b) => a + b, 0);
  return enabled.map(c => ({
    ...c,
    amount: totals[c.key] || 0,
    pct: total ? (totals[c.key] || 0) / total : 0,
  }));
}

function dominantCatForDay(dayExp, byKey) {
  if (!dayExp?.length) return null;
  const acc = {};
  for (const e of dayExp) acc[e.cat] = (acc[e.cat] || 0) + e.amount;
  let best = null, bestAmt = -1;
  for (const [k, v] of Object.entries(acc)) if (v > bestAmt) { best = k; bestAmt = v; }
  return byKey[best];
}

function buildCells(year, month) {
  const dim   = daysInMonth(year, month);
  const first = firstDayOfMonth(year, month);
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  while (cells.length < 42) cells.push(null);
  while (cells.length > 35 && cells.slice(-7).every(c => c === null)) cells.length -= 7;
  return cells;
}

function pacingMessage(spent, expected, effBudget, totalBudget, closedCount) {
  if (closedCount > 0 && spent < expected) {
    return `Closed ${closedCount} day${closedCount === 1 ? '' : 's'}. Budget recalibrated to ${fmtMoney(effBudget)}.`;
  }
  if (spent > expected) return `Over by ${fmtMoney(spent - expected)} this month, but still on pace overall.`;
  if (spent < expected * 0.85) return `Under pace by ${fmtMoney(expected - spent)} — a quiet month.`;
  return `Tracking steady against ${fmtMoney(effBudget)} budget.`;
}

// =============================================================
// State + persistence
// =============================================================

function defaultState() {
  return {
    expenses: SEED_EXPENSES.slice(),
    categories: CATEGORIES_INIT.map(c => ({ ...c })),
    closedDays: [],
    year: TODAY.year,
    month: TODAY.month,
    selectedDay: TODAY.day,
    budgetsEnabled: true,
    monthlyCap: 900,
    darkMode: false,
    route: 'dashboard', // 'dashboard' | 'settings'
  };
}

// One-time best-effort migration from the old Ledger PWA shape.
// Old shape: entries[YYYY-MM-DD] = [{ amount, category, note, ts, ... }]
// We map the *current month's* old entries into our flat day-of-month list.
function migrateLegacy() {
  try {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (!raw) return null;
    const old = JSON.parse(raw);
    const s = defaultState();
    s.expenses = [];
    const prefix = `${TODAY.year}-${String(TODAY.month + 1).padStart(2, '0')}-`;
    const knownCats = new Set(CATEGORIES_INIT.map(c => c.key));
    Object.entries(old.entries || {}).forEach(([key, list]) => {
      if (!key.startsWith(prefix)) return;
      const day = parseInt(key.slice(8, 10), 10);
      if (!day) return;
      list.forEach((e, i) => {
        s.expenses.push({
          id: 'm' + key + i,
          day,
          cat: knownCats.has(e.category) ? e.category : 'other',
          label: e.note || 'Expense',
          amount: Number(e.amount) || 0,
        });
      });
    });
    if (typeof old.monthlyBudget === 'number') s.monthlyCap = old.monthlyBudget;
    return s;
  } catch { return null; }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Sanity: if expenses missing, fall through to default
      if (Array.isArray(parsed.expenses) && Array.isArray(parsed.categories)) {
        return { ...defaultState(), ...parsed };
      }
    }
    const migrated = migrateLegacy();
    if (migrated) {
      // Don't delete the old key — leave it as a rollback breadcrumb.
      return migrated;
    }
  } catch {}
  return defaultState();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

const state = loadState();

// =============================================================
// Derived view-model (recomputed each render)
// =============================================================

function derive() {
  const enabledKeys = new Set(state.categories.filter(c => c.enabled).map(c => c.key));
  const visibleExp  = state.expenses.filter(e => enabledKeys.has(e.cat));
  const byDay       = expensesByDay(state.expenses, enabledKeys);
  const totals      = totalsByCategory(state.expenses, state.categories);
  const monthTotal  = totals.reduce((a, b) => a + b.amount, 0);
  const sumOfCats   = state.categories.filter(c => c.enabled).reduce((a, b) => a + (b.budget || 0), 0);
  const totalBudget = state.budgetsEnabled ? sumOfCats : (state.monthlyCap || 0);
  const dim         = daysInMonth(state.year, state.month);
  const dayRate     = totalBudget / dim;
  const effBudget   = totalBudget - dayRate * state.closedDays.length;

  // Pacing only applies when viewing the current month; future/past months
  // show "tracked days = dim" so the bar reads as "the whole month".
  const isCurrentMonth = state.year === TODAY.year && state.month === TODAY.month;
  const refDay = isCurrentMonth ? TODAY.day : dim;
  const trackedDays   = refDay - state.closedDays.filter(d => d <= refDay).length;
  const expectedSoFar = dayRate * Math.max(0, trackedDays);

  const selDayExp     = byDay[state.selectedDay] || [];
  const selDayTotal   = selDayExp.reduce((a, b) => a + b.amount, 0);
  const monthDelta    = monthTotal - expectedSoFar;
  const catByKey      = Object.fromEntries(state.categories.map(c => [c.key, c]));

  return {
    enabledKeys, visibleExp, byDay, totals, monthTotal, totalBudget,
    effBudget, dim, dayRate, expectedSoFar, trackedDays, monthDelta,
    selDayExp, selDayTotal, catByKey, isCurrentMonth, refDay,
  };
}

// =============================================================
// Local UI state (lives outside the persisted store)
// =============================================================

const ui = {
  modalOpen: false,
  modalDay: TODAY.day,
  modalAmount: '',
  modalCat: 'food',
  modalLabel: '',
  ghostId: null,
  editingDayRowId: null,
  openColorPickerKey: null,
  newCatName: '',
};

// =============================================================
// DOM helpers (tiny — no framework)
// =============================================================

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class')        el.className = v;
    else if (k === 'style')   Object.assign(el.style, v);
    else if (k === 'dataset') Object.assign(el.dataset, v);
    else if (k === 'html')    el.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k in el && typeof el[k] !== 'object') el[k] = v;
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return el;
}

// Animate the giant day amount on change. Stores last value on the element
// so re-rendering doesn't re-trigger from-zero each time.
function setAnimatedNumber(el, target, duration = 400) {
  const from = parseFloat(el.dataset.value || '0');
  el.dataset.value = String(target);
  if (from === target) { el.textContent = String(Math.round(target)); return; }
  const start = performance.now();
  cancelAnimationFrame(+el.dataset.raf || 0);
  const step = (t) => {
    const k = Math.min(1, (t - start) / duration);
    const eased = 1 - Math.pow(1 - k, 3);
    const v = from + (target - from) * eased;
    el.textContent = String(Math.round(v));
    if (k < 1) el.dataset.raf = String(requestAnimationFrame(step));
  };
  el.dataset.raf = String(requestAnimationFrame(step));
}

// =============================================================
// Rendering — top level
// =============================================================

const root = document.getElementById('app');

function render() {
  const d = derive();
  // Persist every render — cheap and avoids losing edits.
  saveState();

  // Toggle dark palette on body so all CSS variables flip.
  document.body.className = state.darkMode ? 'palette-night' : 'palette-warm';
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content',
    state.darkMode ? '#1d1a14' : '#f5efe4');

  const topbar = renderTopbar();

  if (state.route === 'settings') {
    root.replaceChildren(topbar, renderSettings(d));
    return;
  }

  const children = [
    topbar,
    h('div', { class: 'shell' },
      renderLeft(d),
      renderRight(d),
    ),
    h('div', { class: 'fab-wrap' },
      h('button', { class: 'fab-pill', onClick: openAddModal },
        h('span', { class: 'plus' }, '+'),
        'Log expense',
      ),
    ),
  ];
  if (ui.modalOpen) children.push(renderModal(d));
  root.replaceChildren(...children);
}

function renderTopbar() {
  const onSettings = state.route === 'settings';
  return h('div', { class: 'topbar' },
    h('button', {
      class: 'icon-btn',
      title: state.darkMode ? 'Light mode' : 'Dark mode',
      onClick: toggleDark,
    }, sunMoonSvg(state.darkMode)),
    h('button', {
      class: 'icon-btn' + (onSettings ? ' active' : ''),
      title: onSettings ? 'Close settings' : 'Settings',
      onClick: () => setRoute(onSettings ? 'dashboard' : 'settings'),
    }, gearSvg()),
  );
}

// Sliders icon — three horizontal lines with knobs at varying positions.
// Visually distinct from the sun/moon (which has a circle + rays).
function gearSvg() {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', '18'); svg.setAttribute('height', '18');
  svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '1.4');
  svg.setAttribute('stroke-linecap', 'round');
  // Three rails
  const rails = [
    ['M3 6h18'], ['M3 12h18'], ['M3 18h18'],
  ];
  for (const [d] of rails) {
    const p = document.createElementNS(NS, 'path');
    p.setAttribute('d', d); svg.appendChild(p);
  }
  // Three knobs at staggered positions, filled to read as draggable handles
  const knobs = [
    [15, 6], [9, 12], [17, 18],
  ];
  for (const [cx, cy] of knobs) {
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', String(cx)); c.setAttribute('cy', String(cy));
    c.setAttribute('r', '2'); c.setAttribute('fill', 'var(--bg)');
    svg.appendChild(c);
  }
  return svg;
}

// =============================================================
// LEFT column
// =============================================================

function renderLeft(d) {
  const isClosed = state.closedDays.includes(state.selectedDay);
  const isToday  = d.isCurrentMonth && state.selectedDay === TODAY.day;
  const dayLabel = DOW_FULL[new Date(state.year, state.month, state.selectedDay).getDay()];
  const monthAbbr = MONTH_NAMES[state.month].slice(0, 3).toUpperCase();

  return h('div', { class: 'left' },
    h('div', { class: 'left-head' },
      h('div', { class: 'month-tag' }, `${monthAbbr} · ${state.year}`),
      !isToday && h('button', { class: 'jump-today', onClick: () => { Object.assign(state, { year: TODAY.year, month: TODAY.month, selectedDay: TODAY.day }); render(); } },
        'Jump to today'),
    ),

    h('div', { class: 'day-of-week' }, dayLabel + (isClosed ? ' · CLOSED' : '')),
    h('h1', { class: 'day-headline' }, `${MONTH_NAMES[state.month]} ${state.selectedDay}`),

    h('div', { class: 'today-label' }, isToday ? 'Today' : 'This day'),
    renderAmountBig(d.selDayTotal, isClosed),

    renderDelta(d, isClosed),
    renderDayRows(d, isClosed),
    h('div', { class: 'pacing-msg' }, pacingMessage(d.monthTotal, d.expectedSoFar, d.effBudget, d.totalBudget, state.closedDays.length)),

    h('div', { style: { flex: '1', minHeight: '8px' } }),
    renderBudgetRail(d),
  );
}

function renderAmountBig(total, isClosed) {
  const wrap = h('div', { class: 'amount-big' + (isClosed ? ' closed' : '') },
    h('span', { class: 'currency' }, '$'),
    h('span', { class: 'num' }, '0'),
  );
  // Animate the number after it's in the DOM. We pull the existing
  // dataset.value off the *previous* node by reading the current DOM.
  const prevNum = root.querySelector('.amount-big .num');
  if (prevNum) wrap.querySelector('.num').dataset.value = prevNum.dataset.value || '0';
  setTimeout(() => setAnimatedNumber(wrap.querySelector('.num'), total), 0);
  return wrap;
}

function renderDelta(d, isClosed) {
  if (isClosed || d.dayRate <= 0) return h('div', { class: 'delta' }, '');
  const over = d.selDayTotal > d.dayRate;
  const txt = over
    ? `Over daily by ${fmtMoney(d.selDayTotal - d.dayRate)} · Pace ${fmtMoney(d.dayRate)}/day`
    : `${fmtMoney(d.dayRate - d.selDayTotal)} under daily · Pace ${fmtMoney(d.dayRate)}/day`;
  return h('div', { class: 'delta' + (over ? ' over' : '') }, txt);
}

// Unified expenses list. The selected day is pinned at the top; all other
// days in the month with expenses follow in reverse chronological order.
// Clicking a row from another day re-pins that day at the top.
function renderDayRows(d, isClosed) {
  const wrap = h('div', { class: 'day-rows' });

  // Pinned section: the selected day (always shown, even when empty).
  wrap.appendChild(renderDaySection(state.selectedDay, d, { pinned: true, isClosed }));

  // Group every *other* day's expenses (only days that actually have entries).
  const otherDays = Object.keys(d.byDay)
    .map(Number)
    .filter(day => day !== state.selectedDay && (d.byDay[day]?.length > 0))
    .sort((a, b) => b - a);

  otherDays.forEach(day => {
    wrap.appendChild(renderDaySection(day, d, { pinned: false, isClosed: state.closedDays.includes(day) }));
  });

  return wrap;
}

function renderDaySection(day, d, { pinned, isClosed }) {
  const exp = d.byDay[day] || [];
  const dow = DOW_3[new Date(state.year, state.month, day).getDay()];
  const isToday = d.isCurrentMonth && day === TODAY.day;
  const headerSuffix = pinned ? (isToday ? ' · TODAY' : ' · THIS DAY') : '';

  const section = h('div', { class: 'day-section' + (pinned ? ' pinned' : '') });

  // Section header (only for non-pinned days; pinned day's identity is in the headline above).
  if (!pinned) {
    section.appendChild(h('div', {
      class: 'day-section-head',
      onClick: () => { state.selectedDay = day; ui.editingDayRowId = null; render(); },
    },
      h('span', { class: 'mono-tight' }, `${dow} ${day}`),
      isClosed && h('span', { class: 'mono-tight closed-tag' }, 'CLOSED'),
    ));
  } else {
    // The pinned section gets a thin top rule, no header text (the hero already names it).
    if (headerSuffix) {
      // headerSuffix isn't rendered as text — kept for potential future use.
    }
  }

  if (exp.length === 0) {
    // Only the pinned day can be empty here.
    section.appendChild(h('div', { class: 'day-empty' },
      h('span', {}, isClosed ? 'Day closed — skipped from pacing.' : 'Nothing logged this day.'),
      h('button', { class: 'pill' + (isClosed ? ' active' : ''), onClick: toggleClosedDay },
        isClosed ? 'Reopen' : 'Close day'),
    ));
    return section;
  }

  exp.forEach(e => section.appendChild(renderDayRow(e, d, { pinned, day })));

  // Close-day pill is only on the pinned section.
  if (pinned) {
    section.appendChild(h('div', { class: 'close-day-row' },
      h('button', { class: 'pill' + (isClosed ? ' active' : ''), onClick: toggleClosedDay },
        isClosed ? 'Reopen' : 'Close day'),
    ));
  }

  return section;
}

function renderDayRow(e, d, opts = {}) {
  const cat = d.catByKey[e.cat] || state.categories[0];
  // Edit-on-click only for the pinned day. Rows from other days first jump to
  // that day; click again (now pinned) to enter edit mode.
  const isPinned = opts.pinned !== false;
  const editing = isPinned && ui.editingDayRowId === e.id;
  const ghost = e.id === ui.ghostId;

  if (editing) {
    const draft = { amount: e.amount, label: e.label, cat: e.cat };
    const save = () => {
      Object.assign(e, draft, { amount: parseFloat(draft.amount) || e.amount });
      ui.editingDayRowId = null;
      render();
    };
    const cancel = () => { ui.editingDayRowId = null; render(); };
    return h('div', { class: 'day-row editing' },
      h('select', {
        onChange: (ev) => { draft.cat = ev.target.value; },
      }, ...state.categories.filter(c => c.enabled).map(c =>
        h('option', { value: c.key, selected: c.key === e.cat }, c.label.toUpperCase()),
      )),
      h('input', {
        type: 'text', value: draft.label, autofocus: true,
        onInput: (ev) => { draft.label = ev.target.value; },
        onKeydown: (ev) => { if (ev.key === 'Enter') save(); if (ev.key === 'Escape') cancel(); },
      }),
      h('div', { class: 'amt-edit' },
        h('span', { class: 'currency-sm' }, '$'),
        h('input', {
          type: 'number', value: String(draft.amount), step: '0.01',
          onInput: (ev) => { draft.amount = ev.target.value; },
          onKeydown: (ev) => { if (ev.key === 'Enter') save(); if (ev.key === 'Escape') cancel(); },
          onBlur: save,
        }),
      ),
    );
  }

  return h('div', {
    class: 'day-row' + (ghost ? ' ghost' : ''),
    onClick: () => {
      if (isPinned) {
        ui.editingDayRowId = e.id;
      } else {
        // Jump to that day first; user can click again to edit.
        state.selectedDay = e.day;
        ui.editingDayRowId = null;
      }
      render();
    },
  },
    h('span', { class: 'dot', style: { background: cat.color } }),
    h('div', {},
      h('div', { class: 'label' }, e.label),
      h('div', { class: 'cat' }, cat.label),
    ),
    h('div', { class: 'row-actions' },
      h('span', { class: 'amt' }, `$${e.amount}`),
      h('button', {
        class: 'x', title: 'Delete',
        onClick: (ev) => { ev.stopPropagation(); deleteExpense(e.id); },
      }, '×'),
    ),
  );
}

function renderBudgetRail(d) {
  const ratio = Math.min(1, d.monthTotal / Math.max(1, d.effBudget));
  const paceRatio = d.expectedSoFar > 0 && d.expectedSoFar < d.effBudget
    ? (d.expectedSoFar / Math.max(1, d.effBudget)) * 100 : null;

  return h('div', { class: 'budget-rail' },
    h('div', { class: 'rail-track' },
      h('div', { class: 'rail-fill' + (over ? ' over' : ''), style: { width: `${ratio * 100}%` } }),

    ),
    h('div', { class: 'rail-meta' },
      h('span', {}, `${fmtMoney(d.monthTotal)} of ${fmtMoney(d.effBudget)}` + (state.closedDays.length > 0 ? ` · ${state.closedDays.length} closed` : '')),

}

  p.setAttribute('d', path); p.setAttribute('stroke', 'currentColor'); p.setAttribute('stroke-width', '1.2');

}

function sunMoonSvg(dark) {

function renderCalCell(day, i, d, isCurMonth) {

  const fill    = closed ? 'rgba(0,0,0,0.04)' : (total > 0 ? (dom?.color || '#000') + '22' : 'transparent');

  const cls = ['cal-cell'];
  if (isToday) cls.push('today');

  if (closed)  cls.push('closed');

  return h('div', { class: cls.join(' ') },
    h('button', {
      class: 'cell-btn',
      style: { background: fill },

        h('span', { class: 'cell-num' }, String(day)),

function donutSvg(totals, monthTotal) {
  const size = 150, thickness = 20, gap = 2;
  const r = (size - thickness) / 2;
  const c = size / 2;
  const circ = 2 * Math.PI * r;
  const total = totals.reduce((a, b) => a + b.amount, 0) || 1;

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', String(size)); svg.setAttribute('height', String(size));
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  svg.style.display = 'block';

  const bg = document.createElementNS(NS, 'circle');
  bg.setAttribute('cx', String(c)); bg.setAttribute('cy', String(c)); bg.setAttribute('r', String(r));
  bg.setAttribute('fill', 'none'); bg.setAttribute('stroke', 'rgba(0,0,0,0.06)'); bg.setAttribute('stroke-width', String(thickness));
  svg.appendChild(bg);

  let offset = 0;
  for (const t of totals) {
    const frac = t.amount / total;
    const len = Math.max(0, frac * circ - gap);
    const dash = `${len} ${circ - len}`;
    const dashOff = -offset;
    offset += frac * circ;
    const arc = document.createElementNS(NS, 'circle');
    arc.setAttribute('cx', String(c)); arc.setAttribute('cy', String(c)); arc.setAttribute('r', String(r));
    arc.setAttribute('fill', 'none'); arc.setAttribute('stroke', t.color); arc.setAttribute('stroke-width', String(thickness));
    arc.setAttribute('stroke-dasharray', dash); arc.setAttribute('stroke-dashoffset', String(dashOff));
    arc.setAttribute('stroke-linecap', 'butt');
    arc.setAttribute('transform', `rotate(-90 ${c} ${c})`);
    arc.style.transition = 'stroke-dasharray 500ms cubic-bezier(0.22,1,0.36,1), stroke-dashoffset 500ms cubic-bezier(0.22,1,0.36,1)';
    svg.appendChild(arc);
  }

  const lbl = document.createElementNS(NS, 'text');
  lbl.setAttribute('x', String(c)); lbl.setAttribute('y', String(c - 2));
  lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('dominant-baseline', 'middle');
  lbl.setAttribute('style', 'font: 500 22px var(--font-display); fill: var(--ink);');
  lbl.textContent = `$${Math.round(monthTotal)}`;
  svg.appendChild(lbl);

  const sub = document.createElementNS(NS, 'text');
  sub.setAttribute('x', String(c)); sub.setAttribute('y', String(c + 18));
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('dominant-baseline', 'middle');
  sub.setAttribute('style', 'font: 500 9px var(--font-mono); letter-spacing: 0.18em; fill: var(--ink-soft);');
  sub.textContent = 'TOTAL';
  svg.appendChild(sub);

  return svg;
}

function catPlainRow(t, monthTotal) {
  const pct = monthTotal > 0 ? Math.round((t.amount / monthTotal) * 100) : 0;
  return h('div', { class: 'cat-row' },

  const n = parseFloat(ui.modalAmount);
  if (!n || n <= 0) return;
  const catObj = state.categories.find(c => c.key === ui.modalCat);
  const id = 'e' + Math.random().toString(36).slice(2, 8);
  state.expenses.unshift({
    id, day: ui.modalDay,
    cat: ui.modalCat,
    label: (ui.modalLabel || '').trim() || catObj?.label || 'Expense',
    amount: n,
  });
  state.selectedDay = ui.modalDay;
  ui.ghostId = id;
  ui.modalOpen = false;
  render();
  setTimeout(() => { ui.ghostId = null; render(); }, 800);

  return h('div', { class: 'modal-backdrop', onClick: closeAddModal },
    h('div', { class: 'modal', onClick: (ev) => ev.stopPropagation() },
      h('div', { class: 'modal-kicker' }, 'New expense'),
      h('div', { class: 'amount-input-wrap' },
        h('span', { class: 'currency' }, '$'),
        h('input', {
          type: 'number', step: '0.01', placeholder: '0', inputmode: 'decimal',
          value: ui.modalAmount,
          onInput: (ev) => { ui.modalAmount = ev.target.value; },
          onKeydown: (ev) => { if (ev.key === 'Enter') submitAdd(); if (ev.key === 'Escape') closeAddModal(); },
        }),
      ),
      h('div', { class: 'field-label' }, 'Category'),
      h('div', { class: 'cat-chips' }, ...enabledCats.map(c => {
        const active = c.key === ui.modalCat;
        return h('button', {
          class: 'cat-chip',
          style: {
            border: `1px solid ${active ? c.color : 'var(--rule)'}`,
            background: active ? c.color + '22' : 'transparent',
          },
          onClick: () => { ui.modalCat = c.key; render(); setTimeout(() => document.querySelector('.modal input[type="number"]')?.focus(), 0); },
        },
          h('span', { class: 'chip-dot', style: { background: c.color } }),
          c.label,
        );
      })),
      h('div', { class: 'note-day-row' },
        h('div', {},
          h('div', { class: 'field-label' }, 'Note'),
          h('input', {
            type: 'text', placeholder: 'optional', value: ui.modalLabel,
            onInput: (ev) => { ui.modalLabel = ev.target.value; },
            onKeydown: (ev) => { if (ev.key === 'Enter') submitAdd(); if (ev.key === 'Escape') closeAddModal(); },
          }),
        ),
        h('div', {},
          h('div', { class: 'field-label' }, 'Day'),
          h('input', {
            type: 'number', min: '1', max: String(d.dim), value: String(ui.modalDay),
            onInput: (ev) => { ui.modalDay = parseInt(ev.target.value, 10) || 1; },
            onKeydown: (ev) => { if (ev.key === 'Enter') submitAdd(); if (ev.key === 'Escape') closeAddModal(); },
          }),
        ),
      ),
      h('div', { class: 'modal-actions' },
        h('button', { class: 'btn-cancel', onClick: closeAddModal }, 'Cancel'),
        h('button', { class: 'btn-add', onClick: submitAdd, disabled: !(parseFloat(ui.modalAmount) > 0) }, 'Add'),
      ),
    ),
  );
}

// =============================================================
// Actions
// =============================================================

function deleteExpense(id) {
  state.expenses = state.expenses.filter(e => e.id !== id);
  ui.editingDayRowId = null;
  render();
}

function toggleClosedDay() {
  toggleClosedFor(state.selectedDay);
}

function toggleClosedFor(day) {
  const has = state.closedDays.includes(day);
  state.closedDays = has
    ? state.closedDays.filter(d => d !== day)
    : [...state.closedDays, day].sort((a, b) => a - b);
  render();
}

function prevMonth() {
  if (state.month === 0) { state.month = 11; state.year -= 1; } else { state.month -= 1; }
  // Clamp selectedDay to new month length
  const dim = daysInMonth(state.year, state.month);
  state.selectedDay = Math.min(state.selectedDay, dim);
  state.closedDays = []; // closed-day list is per-month; reset when navigating
  render();
}

function nextMonth() {
  if (state.month === 11) { state.month = 0; state.year += 1; } else { state.month += 1; }
  const dim = daysInMonth(state.year, state.month);
  state.selectedDay = Math.min(state.selectedDay, dim);
  state.closedDays = [];
  render();
}

function toggleDark() {
  state.darkMode = !state.darkMode;
  render();
}

// =============================================================
// Settings actions
// =============================================================

function setRoute(route) {
  state.route = route;
  // Close any in-progress edits when leaving the dashboard
  if (route !== 'dashboard') {
    ui.editingDayRowId = null;
    ui.modalOpen = false;
  }
  if (route !== 'settings') {
    ui.openColorPickerKey = null;
  }
  render();
}

function addCategory(name) {
  const trimmed = (name || '').trim();
  if (!trimmed) return;
  const used = new Set(state.categories.map(c => c.color));
  const color = PALETTE_POOL.find(c => !used.has(c)) || PALETTE_POOL[state.categories.length % PALETTE_POOL.length];
  const slug = trimmed.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'cat';
  const key = slug + '-' + Math.random().toString(36).slice(2, 5);
  state.categories.push({ key, label: trimmed, color, budget: 50, enabled: true });
  render();
}

function updateCategory(key, patch) {
  const c = state.categories.find(c => c.key === key);
  if (!c) return;
  Object.assign(c, patch);
  render();
}

function removeCategory(key) {
  state.categories = state.categories.filter(c => c.key !== key);
  // Note: orphan expenses (those whose .cat no longer matches any category)
  // stay in state.expenses but won't render until reassigned. That's intentional —
  // deleting a category shouldn't silently nuke the user's spend history.
  if (ui.openColorPickerKey === key) ui.openColorPickerKey = null;
  render();
}

function setBudgetsEnabled(on) {
  state.budgetsEnabled = !!on;
  render();
}

function setMonthlyCap(n) {
  state.monthlyCap = Math.max(0, parseInt(n, 10) || 0);
  render();
}

// Close every untracked past day in the current month (≤ today).
// Days that already have expenses are skipped; days already closed are skipped.
function closeGaps() {
  const isCur = state.year === TODAY.year && state.month === TODAY.month;
  const dim = daysInMonth(state.year, state.month);
  const refDay = isCur ? TODAY.day : dim;
  const enabledKeys = new Set(state.categories.filter(c => c.enabled).map(c => c.key));
  const byDay = expensesByDay(state.expenses, enabledKeys);
  const toClose = [];
  for (let d = 1; d <= refDay; d++) {
    if (!byDay[d] && !state.closedDays.includes(d)) toClose.push(d);
  }
  state.closedDays = [...new Set([...state.closedDays, ...toClose])].sort((a, b) => a - b);
  render();
}

// Global Esc: close modal first, otherwise dismiss color picker, otherwise leave Settings
document.addEventListener('keydown', (ev) => {
  if (ev.key !== 'Escape') return;
  if (ui.modalOpen) { closeAddModal(); return; }
  if (ui.openColorPickerKey) { ui.openColorPickerKey = null; render(); return; }
  if (state.route === 'settings') setRoute('dashboard');
});

// =============================================================
// PWA service worker
// =============================================================

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

// =============================================================
// Boot
// =============================================================

render();
</script>
